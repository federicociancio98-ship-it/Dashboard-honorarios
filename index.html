<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Gastos 2026</title>

  <!-- MSAL con fallback de CDN (igual que la versión anterior) -->
  <script>
    window.MSAL_LOAD_PROMISE = (function () {
      const SOURCES = [
        'https://alcdn.msauth.net/browser/3.10.0/js/msal-browser.min.js',
        'https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.10.0/lib/msal-browser.min.js',
        'https://unpkg.com/@azure/msal-browser@3.10.0/lib/msal-browser.min.js'
      ];
      function loadFrom(url) {
        return new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = url;
          s.onload = () => window.msal ? resolve(url) : reject(new Error('Loaded but msal undefined'));
          s.onerror = () => reject(new Error('Failed to load ' + url));
          document.head.appendChild(s);
        });
      }
      return (async () => {
        for (const url of SOURCES) {
          try { await loadFrom(url); console.log('MSAL cargado desde:', url); return true; }
          catch (e) { console.warn(e.message); }
        }
        throw new Error('No se pudo cargar MSAL desde ningún CDN');
      })();
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── PALETA (idéntica a Dashboard Honorarios) ── */
    :root {
      --bg: #f5f3ef; --surface: #ffffff; --surface2: #faf9f6; --border: #e8e4dc;
      --text: #2c2825; --text-soft: #7a6f65; --text-muted: #b0a89e;
      --slate: #6b8cae; --slate-light: #e8f0f8;
      --sage: #7aa68a;  --sage-light: #e6f2eb;
      --mauve: #9b86a8; --mauve-light: #f0eaf4;
      --sand: #c4a882;  --sand-light: #faf3ea;
      --warm: #d4856a;  --warm-light: #fceee9;
      --radius: 16px; --radius-sm: 10px;
      --shadow: 0 2px 12px rgba(44,40,37,0.07);
      --shadow-md: 0 4px 24px rgba(44,40,37,0.10);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    h1, h2, h3 { font-family: 'DM Serif Display', serif; font-weight: 400; }
    .app { max-width: 1300px; margin: 0 auto; padding: 32px 24px 60px; }

    /* ── HEADER ── */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
    .header-title { font-size: 28px; }
    .header-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; font-family: 'DM Sans'; }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    /* ── BOTONES ── */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: var(--radius-sm); font-family: 'DM Sans'; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.18s; white-space: nowrap; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline { background: var(--surface); color: var(--text-soft); border: 1.5px solid var(--border); }
    .btn-outline:hover:not(:disabled) { border-color: var(--slate); color: var(--slate); }
    .btn-sm { padding: 5px 11px; font-size: 12px; }
    .btn-success { background: var(--sage); color: #fff; }
    .btn-success:hover:not(:disabled) { background: #6a9279; }
    .btn-danger { background: var(--warm-light); color: var(--warm); border: 1.5px solid #f0c4b4; }
    .btn-danger:hover:not(:disabled) { background: #f8dccd; }
    .btn-mauve { background: var(--mauve); color: #fff; }
    .btn-mauve:hover:not(:disabled) { background: #8a7798; }
    .btn-slate { background: var(--slate); color: #fff; }
    .btn-slate:hover:not(:disabled) { background: #5b7c9d; }
    .btn-warm { background: var(--warm); color: #fff; }
    .btn-warm:hover:not(:disabled) { background: #c0735a; }
    .btn-block { width: 100%; justify-content: center; }
    .btn-lg { padding: 12px 22px; font-size: 14px; font-weight: 600; }
    .btn-cta { background: var(--warm); color: #fff; box-shadow: 0 6px 18px rgba(212,133,106,0.32); }
    .btn-cta:hover:not(:disabled) { background: #c0735a; transform: translateY(-1px); }

    /* ── CARDS ── */
    .card { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); box-shadow: var(--shadow); padding: 24px; }
    .card-title { font-size: 12px; color: var(--text-soft); margin-bottom: 16px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .card-pad-md { padding: 18px 20px; }

    /* ── KPIs ── */
    .kpis { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 14px; margin-bottom: 24px; }
    .kpi { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); box-shadow: var(--shadow); padding: 18px 20px; min-width: 0; overflow: hidden; }
    .kpi-label { font-size: 10px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; line-height: 1.3; }
    .kpi-value { font-family: 'DM Serif Display'; font-size: clamp(18px, 4.2vw, 28px); color: var(--text); line-height: 1.1; font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 5px; }
    /* Grid responsive para cards de tarjetas: 150px minimo, auto-fit. Las KPI tienen valores
       grandes y nombres largos como "Santa Fe PAPA", por eso necesitan mas ancho minimo. */
    .kpis-cards { grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)) !important; }
    .kpis-cards .kpi-value { font-size: clamp(16px, 3.6vw, 22px); }
    .kpi.slate { border-top: 3px solid var(--slate); }
    .kpi.sage  { border-top: 3px solid var(--sage); }
    .kpi.warm  { border-top: 3px solid var(--warm); }
    .kpi.mauve { border-top: 3px solid var(--mauve); }
    .kpi.sand  { border-top: 3px solid var(--sand); }
    .kpi-value.sage  { color: #3d6a52; }
    .kpi-value.warm  { color: #b85f3f; }
    .kpi-value.slate { color: #4d77a0; }
    .kpi-value.mauve { color: #7d6592; }
    .kpi-value.sand  { color: #a98759; }

    /* ── GRID ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 24px; border: 1.5px solid var(--border); width: fit-content; max-width: 100%; flex-wrap: wrap; }
    .tab { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-soft); transition: all 0.15s; border: none; background: none; font-family: 'DM Sans'; white-space: nowrap; }
    .tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
    .tab:hover:not(.active) { color: var(--text); }

    /* ── CONTROLES / FORMS ── */
    .filters { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
    .filter-select, .search-input, .form-input, select, input[type="text"], input[type="number"], input[type="date"], input[type="month"], textarea {
      padding: 9px 13px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--surface);
      font-family: 'DM Sans'; font-size: 13px; color: var(--text); outline: none; transition: border 0.15s;
    }
    .filter-select:focus, .search-input:focus, .form-input:focus, select:focus, input:focus, textarea:focus { border-color: var(--slate); }
    .search-input { min-width: 220px; }

    /* ── TABLAS ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 14px; border-bottom: 1.5px solid var(--border); white-space: nowrap; }
    td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }

    /* ── BADGES ── */
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .badge-pagada    { background: var(--sage-light); color: #3a6a4a; }
    .badge-pendiente { background: var(--warm-light); color: #a04a2a; }
    .badge-anulada   { background: #f0f0f0; color: #888; }
    .badge-info      { background: var(--slate-light); color: #2d4d6e; }
    .badge-warn      { background: var(--sand-light); color: #8a6a1c; }
    .badge-mauve     { background: var(--mauve-light); color: #5d456a; }

    /* ── FILA DE PAGO PENDIENTE ── */
    .pending-item { display: flex; align-items: center; justify-content: space-between; padding: 13px 0; border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
    .pending-item:last-child { border-bottom: none; }
    .pending-name { font-size: 13px; font-weight: 500; }
    .pending-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .pending-amount { font-family: 'DM Serif Display'; font-size: 18px; color: var(--warm); white-space: nowrap; }
    .pending-amount.sage { color: var(--sage); }

    /* ── BANNER NOTIFICACIÓN ── */
    .notice { padding: 14px 18px; border-radius: var(--radius-sm); margin-bottom: 18px; font-size: 13px; line-height: 1.5; display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }
    .notice.info { background: var(--slate-light); border: 1.5px solid #c4d4e4; color: #2d4d6e; }
    .notice.warn { background: var(--warm-light); border: 1.5px solid #f0c4b4; color: #8a3a20; }
    .notice.sage { background: var(--sage-light); border: 1.5px solid #c8d8cf; color: #3a6a4a; }
    .notice strong { font-weight: 600; }

    /* ── CHARTS ── */
    .chart-box { width: 100%; height: 240px; position: relative; }
    .chart-box.tall { height: 320px; }
    .chart-box.short { height: 180px; }

    /* ── PROGRESS ── */
    .progress { height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; margin: 6px 0; }
    .progress-bar { height: 100%; background: var(--sage); transition: width 0.4s; }

    /* ── LOGIN / LOADING ── */
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-card { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); box-shadow: var(--shadow-md); padding: 48px 56px; text-align: center; max-width: 420px; width: 100%; }
    .login-card h1 { font-size: 30px; margin-bottom: 8px; }
    .login-card p { font-size: 14px; color: var(--text-soft); margin-bottom: 28px; line-height: 1.7; }
    .ms-btn { display: inline-flex; align-items: center; gap: 10px; padding: 12px 26px; border-radius: var(--radius-sm); background: #0078d4; color: #fff; font-family: 'DM Sans'; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: background 0.18s; }
    .ms-btn:hover { background: #006abc; }
    .loading { text-align: center; padding: 60px; color: var(--text-muted); font-size: 14px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--slate); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── BOXES ── */
    .error-box { background: var(--warm-light); border: 1.5px solid #f0c4b4; border-radius: var(--radius-sm); padding: 14px 18px; font-size: 13px; color: #8a3a20; margin-bottom: 20px; line-height: 1.5; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .error-box .close-x { background: none; border: none; cursor: pointer; color: #8a3a20; font-size: 16px; line-height: 1; }
    .info-box { background: var(--slate-light); border: 1.5px solid #c4d4e4; border-radius: var(--radius-sm); padding: 14px 18px; font-size: 13px; color: #2d4d6e; margin-bottom: 20px; line-height: 1.5; }

    /* ── SECTION HEADER ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .section-header h2 { font-size: 22px; }
    .section-header h3 { font-size: 18px; }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(44,40,37,0.45); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
    .modal { background: var(--surface); border-radius: var(--radius); padding: 28px; max-width: 520px; width: 100%; box-shadow: var(--shadow-md); max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 22px; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: var(--text-soft); margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .form-group label { font-size: 12px; font-weight: 500; color: var(--text-soft); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; flex-wrap: wrap; }

    /* ── METHOD PICKER (paso 1 modal) ── */
    .method-picker { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 8px; }
    .method-card { background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius); padding: 18px 14px; text-align: center; cursor: pointer; transition: all 0.18s; font-family: 'DM Sans'; }
    .method-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .method-card.selected { border-color: var(--slate); background: var(--slate-light); }
    .method-card .icon { font-size: 28px; margin-bottom: 6px; display: block; }
    .method-card .label { font-size: 13px; font-weight: 600; color: var(--text); }
    .method-card .sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

    /* ── STATUS PILL ── */
    .status-pill { font-size: 11px; padding: 5px 11px; border-radius: 999px; border: 1.5px solid var(--border); color: var(--text-soft); background: var(--surface); white-space: nowrap; max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
    .status-pill.ok { color: #3a6a4a; border-color: #c8d8cf; background: var(--sage-light); }
    .status-pill.err { color: #8a3a20; border-color: #f0c4b4; background: var(--warm-light); }
    .status-pill.wait { color: var(--text-soft); }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) {
      .kpis { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 900px) {
      .kpis { grid-template-columns: repeat(2, 1fr); }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .app { padding: 16px; }
      .login-card { padding: 32px 20px; }
      .form-row, .form-row-3, .method-picker { grid-template-columns: 1fr; }
      .header-title { font-size: 22px; }
    }
  </style>
</head>

<script>
// ╔════════════════════════════════════════════════════════════════════════╗

}

function excelDateToDate(v) {

async function initAuth() {
  msalApp = new msal.PublicClientApplication({
    auth: { clientId: CONFIG.clientId, authority: 'https://login.microsoftonline.com/common', redirectUri: window.location.origin + window.location.pathname },
    cache: { cacheLocation: 'localStorage' }
  });
  await msalApp.initialize();

  let redirectResult = null;
  try { redirectResult = await msalApp.handleRedirectPromise(); }
  catch (e) { console.warn('handleRedirectPromise:', e); }

  if (redirectResult && redirectResult.account) {
    account = redirectResult.account;
    showApp(); await loadAll(); return;
  }
  const accs = msalApp.getAllAccounts();
  if (accs.length) { account = accs[0]; showApp(); await loadAll(); return; }

  $('#loadingScreen').style.display = 'none';
  $('#loginScreen').style.display = 'flex';
}
function showApp() {
  $('#loadingScreen').style.display = 'none';
  $('#loginScreen').style.display = 'none';
  $('#app').style.display = 'block';
}
function login() {
  if (!msalApp) { alert('La librería de autenticación no se cargó. Refrescá la página.'); return; }
  try { msalApp.loginRedirect({ scopes: CONFIG.scopes }); }
  catch (e) { alert('Error al iniciar sesión: ' + e.message); }
}
async function logout() {
  if (!confirm('¿Cerrar sesión?')) return;
  sessionStorage.clear();
  msalApp.logoutRedirect({ postLogoutRedirectUri: window.location.origin + window.location.pathname });
}
async function getToken() {
  try { return (await msalApp.acquireTokenSilent({ scopes: CONFIG.scopes, account })).accessToken; }
  catch (e) { await msalApp.acquireTokenRedirect({ scopes: CONFIG.scopes, account }); return null; }
}

async function gFetch(path, options = {}) {
  const t = await getToken();
  if (!t) return null;
  const headers = Object.assign({ 'Authorization': 'Bearer ' + t }, options.headers || {});
  if (options.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
  if (sessionId && driveItem && path.includes('/items/' + driveItem.id + '/workbook/') && !path.includes('/createSession')) headers['workbook-session-id'] = sessionId;
  const res = await fetch('https://graph.microsoft.com/v1.0' + path, { ...options, headers });
  if (!res.ok) { const txt = await res.text(); throw new Error(res.status + ' ' + txt); }
  if (res.status === 204) return null;
  return res.json();
}

function sheetAoa(sheetName) {
  const ws = gastosWorkbook.Sheets[sheetName];
  if (!ws) return [];
  return XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:''});
}

function updateRef(ws, r, c) {
  const old = ws['!ref'] ? XLSX.utils.decode_range(ws['!ref']) : {s:{r:0,c:0}, e:{r:0,c:0}};
  old.s.r = Math.min(old.s.r, 0);
  old.s.c = Math.min(old.s.c, 0);
  old.e.r = Math.max(old.e.r, r);
  old.e.c = Math.max(old.e.c, c);
  ws['!ref'] = XLSX.utils.encode_range(old);
}

function setCell(ws, row1, col1, value) {
  const addr = XLSX.utils.encode_cell({r: row1-1, c: col1-1});
  if (value === null || value === undefined || value === '') {
    ws[addr] = {t:'s', v:''};
  } else if (typeof value === 'number' && isFinite(value)) {
    ws[addr] = {t:'n', v:value};
  } else if (typeof value === 'boolean') {
    ws[addr] = {t:'b', v:value};
  } else {
    ws[addr] = {t:'s', v:String(value)};
  }
  updateRef(ws, row1-1, col1-1);
}

function a1Parts(address) {
  const a = (address || '').split('!').pop().replace(/'/g, '');
  const [start, end] = a.split(':');
  const cellRe = /([A-Z]+)(\d+)/i;
  const s = start.match(cellRe); const e = (end || start).match(cellRe);
  const colToNum = c => String(c).toUpperCase().split('').reduce((n,ch)=>n*26 + ch.charCodeAt(0)-64, 0);
  const numToCol = n => { let out=''; while(n>0){ const r=(n-1)%26; out=String.fromCharCode(65+r)+out; n=Math.floor((n-1)/26); } return out; };
  return {
    startCol: s ? s[1].toUpperCase() : 'A', startRow: s ? Number(s[2]) : 1,
    endCol: e ? e[1].toUpperCase() : 'A', endRow: e ? Number(e[2]) : 1,
    startColNum: s ? colToNum(s[1]) : 1, endColNum: e ? colToNum(e[1]) : 1, numToCol
  };
}

async function openWorkbook() {
  sessionId = null; // El Excel de gastos ya no usa workbook sessions.
  if (!window.XLSX) throw new Error('No se cargó la librería XLSX. Refrescá la página.');
  driveItem = await gFetch(`/me/drive/root:/${encodePath(CONFIG.excelPath)}:`);
  const t = await getToken();
  const res = await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${driveItem.id}/content`, {
    headers: { Authorization: 'Bearer ' + t }
  });
  if (!res.ok) throw new Error('No se pudo descargar el Excel de gastos: ' + res.status + ' ' + await res.text());
  const ab = await res.arrayBuffer();
  gastosWorkbook = XLSX.read(ab, {type:'array', cellDates:false});
  // Asegurar hojas mínimas. No depende de la API /workbook de Graph.
  Object.keys(SHEETS).forEach(k => { if (EXPECTED_HEADERS[k]) ensureSheetForKey(k); });
}

async function saveGastosWorkbook() {
  if (!gastosWorkbook || !driveItem) return;
  const t = await getToken();
  const wbout = XLSX.write(gastosWorkbook, {bookType:'xlsx', type:'array'});
  const upload = async () => fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${driveItem.id}/content`, {
    method: 'PUT',
    headers: {
      Authorization: 'Bearer ' + t,
      'Content-Type': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
    },
    body: wbout
  });
  let res = await upload();
  for (let attempt = 0; attempt < 3 && !res.ok && [409, 412, 423, 503].includes(res.status); attempt++) {
    await new Promise(r => setTimeout(r, 600 * (attempt + 1)));
    try { driveItem = await gFetch(`/me/drive/root:/${encodePath(CONFIG.excelPath)}:`); } catch (_) {}
    res = await upload();
  }
  if (!res.ok) {
    const txt = await res.text();
    const locked = res.status === 412 || res.status === 423 || /notAllowed|resourceLocked|locked|coauth/i.test(txt);
    if (locked) throw new Error('Gastos 2026.xlsx parece estar abierto en Excel/OneDrive (escritorio, app movil u otra pestana). Cerralo y reintenta.');
    throw new Error('No se pudo guardar el Excel de gastos: ' + res.status + ' ' + txt);
  }
  try { driveItem = await res.json(); } catch (_) {}
}

async function readTable(name) {
  const key = tableKeyFromName(name);
  if (!key) return { headers: [], data: [], address: '' };
  const sheetName = SHEETS[key];
  const ws = ensureSheetForKey(key);
  const aoa = sheetAoa(sheetName);
  const fallbackHeaders = EXPECTED_HEADERS[key] || [];
  let headers = (aoa[0] || []).map(h => String(h || '').trim());
  if (!headers.filter(Boolean).length) {
    headers = fallbackHeaders;
    XLSX.utils.sheet_add_aoa(ws, [headers], {origin:'A1'});
  }
  // limitar al ancho real de headers esperados si la hoja venía con columnas visuales extra
  const usefulCols = Math.max(headers.filter(Boolean).length, fallbackHeaders.length, 1);
  headers = headers.slice(0, usefulCols);
  const data = aoa.slice(1)
    .map((row, i) => ({row: (row || []).slice(0, usefulCols), originalIdx: i + 1}))
    .filter(({row}) => !aoaIsEmptyRow(row))
    .map(({row, originalIdx}) => {
      const o = {__rowIndex: originalIdx, __address: `${sheetName}!A1:${XLSX.utils.encode_cell({r: Math.max(aoa.length-1,0), c: usefulCols-1})}`};
      headers.forEach((h,j) => { if (h) o[h] = row[j]; });
      return o;
    });
  const endCell = XLSX.utils.encode_cell({r: Math.max(aoa.length-1, 0), c: usefulCols-1});
  return { headers, data, address: `${sheetName}!A1:${endCell}` };
}

async function patchRange(sheet, address, values2d) {
  const key = keyFromSheetName(sheet);
  const ws = key ? ensureSheetForKey(key) : (gastosWorkbook.Sheets[sheet] || (gastosWorkbook.SheetNames.push(sheet), gastosWorkbook.Sheets[sheet] = XLSX.utils.aoa_to_sheet([[]])));
  const parts = a1Parts(address);
  for (let r=0; r<values2d.length; r++) {
    for (let c=0; c<(values2d[r] || []).length; c++) {
      setCell(ws, parts.startRow + r, parts.startColNum + c, values2d[r][c]);
    }
  }
  await saveGastosWorkbook();
}

function _addRowToWorkbook(tableName, values) {
  // Inserta una fila al workbook EN MEMORIA, sin disparar el upload a OneDrive.
  // Para batch writes, usar addRowsBatch que llama esto N veces + 1 save al final.
  const key = tableKeyFromName(tableName);
  if (!key) throw new Error('Tabla no configurada: ' + tableName);
  const sheetName = SHEETS[key];
  const ws = ensureSheetForKey(key);
  const headers = EXPECTED_HEADERS[key] || [];
  const aoa = sheetAoa(sheetName);
  const colCount = Math.max(headers.length, (aoa[0] || []).filter(x=>x!=='').length, values.length);
  if (values.length < colCount) values = values.concat(Array(colCount - values.length).fill(''));
  if (values.length > colCount) values = values.slice(0, colCount);
  let rowIndex0 = Math.max(aoa.length, 1);
  for (let i=1; i<aoa.length; i++) {
    const row = (aoa[i] || []).slice(0, colCount);
    if (aoaIsEmptyRow(row)) { rowIndex0 = i; break; }
  }
  XLSX.utils.sheet_add_aoa(ws, [values], {origin:{r: rowIndex0, c:0}});
  updateRef(ws, rowIndex0, colCount-1);
}

async function addRow(tableName, values) {
  _addRowToWorkbook(tableName, values);
  await saveGastosWorkbook();
}

async function addRowsBatch(adds) {
  // adds = [{ table, values }, ...]. Hace un solo upload final.
  for (const a of adds) _addRowToWorkbook(a.table, a.values);
  await saveGastosWorkbook();
}

async function writeFirstBlankDataRowIfAvailable(key, values) {
  const sheet = SHEETS[key];
  if (!sheet) return false;
  const ws = ensureSheetForKey(key);
  const aoa = sheetAoa(sheet);
  const colCount = Math.max((EXPECTED_HEADERS[key] || []).length, values.length);
  for (let i=1; i<aoa.length; i++) {
    const row = (aoa[i] || []).slice(0, colCount);
    if (aoaIsEmptyRow(row)) {
      XLSX.utils.sheet_add_aoa(ws, [values], {origin:{r:i, c:0}});
      await saveGastosWorkbook();
      return true;
    }
  }
  return false;
}

async function patchCell(sheet, address, value) {
  const key = keyFromSheetName(sheet);
  const ws = key ? ensureSheetForKey(key) : (gastosWorkbook.Sheets[sheet] || (gastosWorkbook.SheetNames.push(sheet), gastosWorkbook.Sheets[sheet] = XLSX.utils.aoa_to_sheet([[]])));

}

function parseHonorariosFechaPago(rawValue, rawText) {
  if (rawValue instanceof Date && !isNaN(rawValue)) return rawValue;
  if (typeof rawValue === 'number' && isFinite(rawValue) && rawValue > 0) {
    const d = excelDateToDate(rawValue);
    if (d && !isNaN(d)) return d;
  }
  const candidatos = [rawText, rawValue].map(v => String(v == null ? '' : v).trim()).filter(Boolean);
  for (const txt of candidatos) {
    if (!txt || txt === '0') continue;
    let m = txt.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (m) return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
    m = txt.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if (m) return new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
    m = txt.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2})$/);
    if (m) {
      const yr = Number(m[3]); const fullY = yr < 50 ? 2000 + yr : 1900 + yr;
      return new Date(fullY, Number(m[2]) - 1, Number(m[1]));
    }
    if (/^\d+(\.\d+)?$/.test(txt)) {
      const d = excelDateToDate(Number(txt));
      if (d && !isNaN(d) && d.getFullYear() > 2000) return d;
    }
  }
  return null;
}

function parseHonorarios(range) {
  const values = range?.values || [];
  const text = range?.text || [];
  if (values.length < 2) return [];
  return values.slice(1).map((row, i) => {
    const t = text[i + 1] || [];
    const rawId = row[0];
    if (!rawId || isNaN(Number(rawId))) return null;
    const rawMonto = row[8];
    const monto = typeof rawMonto === 'number' ? rawMonto :
      (parseFloat(String(rawMonto || '').replace(/[^\d,.-]/g, '').replace(/\./g, '').replace(',', '.')) || 0);
    const mesTxt = String(row[3] || '').trim().toUpperCase().substring(0, 3);
    const anio = Number(row[4]) || 0;
    const mesIdx = MESES_HON.indexOf(mesTxt);
    const estado = (() => {
      const s = String(row[9] || 'Pendiente').trim().toLowerCase();
      if (s.startsWith('pag')) return 'Pagada';
      if (s.startsWith('anu')) return 'Anulada';
      return 'Pendiente';
    })();
    const tipo = (() => {
      const s = String(row[13] || '').trim().toLowerCase();
      if (s.startsWith('comp')) return 'Compartida';
      if (s.startsWith('sin')) return 'Sin Factura';
      if (s.startsWith('des')) return 'Desestimada';
      return 'Propia';
    })();
    const fechaPago = parseHonorariosFechaPago(row[10], t[10]);
    return {
      rowExcel: i + 4, id: Number(rawId),
      cliente: String(row[1] || '').trim(),
      cuit: String(row[2] || '').trim(),
      mesTxt, anio,
      mesServicio: mesIdx + 1, anioServicio: anio,
      monto, estado, tipo,
      fechaEmision: (() => {
        const fe = row[5];
        if (typeof fe === 'number') return excelDateToDate(fe);
        const txt = String(t[5] || fe || '').trim();
        const m = txt.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
        return m ? new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1])) : null;
      })(),
      fechaPago,
      mesPago: fechaPago ? fechaPago.getMonth() + 1 : null,
      anioPago: fechaPago ? fechaPago.getFullYear() : null,
      concepto: String(row[7] || '').trim(),
      nroFactura: String(t[6] || row[6] || '').trim(),
      notas: String(row[11] || '').trim(),
      pdf: String(row[12] || '').trim(),
      categoriaIngreso: inferCategoriaIngreso(String(row[1] || '').trim(), String(row[11] || '').trim(), String(row[7] || '').trim()),
    };
  }).filter(Boolean);
}


function todayDDMMYYYY() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function inputDateToDDMMYYYY(input) {
  if (!input) return todayDDMMYYYY();
  const d = new Date(input + 'T00:00:00');
  if (isNaN(d)) return todayDDMMYYYY();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function dateToInputValueLocal(d) {
  if (!d) return '';
  const dt = d instanceof Date ? d : excelDateToDate(d);

  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function addMonthsYM(y, m, delta) {
  const d = new Date(Number(y), Number(m) - 1 + Number(delta || 0), 1);
  return { y: d.getFullYear(), m: d.getMonth() + 1, mesTxt: MESES_HON[d.getMonth()] };
}
function honorarioEmissionYM(f) {
  if (f.fechaEmision instanceof Date && !isNaN(f.fechaEmision)) return { y: f.fechaEmision.getFullYear(), m: f.fechaEmision.getMonth() + 1 };
  if (f.anioServicio && f.mesServicio) return addMonthsYM(f.anioServicio, f.mesServicio, 1);
  return { y: 0, m: 0 };
}
function honorarioEmissionKey(f) {
  const e = honorarioEmissionYM(f);
  return (Number(e.y) || 0) * 100 + (Number(e.m) || 0);
}
function selectedServicePeriodForBilling(y, m) {

}
function mesKeyHonorarios(f) {

function detectFaltantesHonorarios(y, m) {
  const per = selectedServicePeriodForBilling(y, m);
  const cubiertos = new Set(
    facturas
      .filter(f => f.mesServicio === per.m && f.anioServicio === per.y)
      .map(f => f.cliente)

  return clientesRecurrentesHonorarios()
    .filter(c => !cubiertos.has(c))

async function appendHonorariosRow(rowData) {
  const { id, row } = nextHonorariosRowAndId();
  const cat = rowData.categoriaIngreso || inferCategoriaIngreso(rowData.cliente, rowData.notas, rowData.concepto);
  const tag = cat ? `[CAT:${cat}] ` : '';
  const notasFinal = `${tag}${rowData.notas || ''}`.trim();
  const toSerial = v => {
    if (v == null || v === '') return '';
    if (typeof v === 'number') return v;
    const s = String(v).trim();
    let m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if (m) return dateToExcelSerial(`${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`);
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) return dateToExcelSerial(s.substring(0,10));
    return v;
  };
  const fechaEmisionSerial = toSerial(rowData.fechaEmision);
  const fechaPagoSerial = toSerial(rowData.fechaPago);
  const arr = [
    id, rowData.cliente || '', rowData.cuit || '', rowData.mes || '',
    Number(rowData.anio) || rowData.anio || '',
    fechaEmisionSerial, rowData.nroFactura || '', rowData.concepto || '',
    Number(rowData.monto) || 0, rowData.estado || 'Pendiente',
    fechaPagoSerial, notasFinal, rowData.pdf || '', rowData.tipo || 'Propia',

  await patchHonorariosRow(row, arr);
  const mesIdx = MESES_HON.indexOf(String(rowData.mes || '').toUpperCase().substring(0,3));
  const fp = typeof fechaPagoSerial === 'number' ? excelDateToDate(fechaPagoSerial) : null;
  const fe = typeof fechaEmisionSerial === 'number' ? excelDateToDate(fechaEmisionSerial) : null;
  facturas.push({
    rowExcel: row, id,
    cliente: String(rowData.cliente || '').trim(),
    cuit: String(rowData.cuit || '').trim(),
    mesTxt: String(rowData.mes || '').toUpperCase().substring(0,3),
    anio: Number(rowData.anio) || 0,
    mesServicio: mesIdx + 1, anioServicio: Number(rowData.anio) || 0,
    monto: Number(rowData.monto) || 0,
    estado: rowData.estado || 'Pendiente',
    tipo: rowData.tipo || 'Propia',
    fechaEmision: fe, fechaPago: fp,
    mesPago: fp ? fp.getMonth() + 1 : null,
    anioPago: fp ? fp.getFullYear() : null,
    concepto: String(rowData.concepto || '').trim(),
    nroFactura: String(rowData.nroFactura || '').trim(),
    notas: notasFinal, pdf: String(rowData.pdf || '').trim(),
    categoriaIngreso: cat,
  });
  populateMonthFilter();
  renderAll();
  try { await loadAll(); } catch (e) { console.warn('loadAll fallo despues de write:', e); }
  return row;
}

async function auditarPDFsHonorarios() {
  auditingHonorarios = true; setStatus('Escaneando facturas…','wait'); renderAll();
  try {
    const pdfsRegistrados = new Set(facturas.map(f => f.pdf).filter(Boolean));
    const result = { scannedAt: new Date().toLocaleString('es-AR'), summary: { ok:0, malNombrados:0, sinRegistrar:0, sinCarpeta:0 }, porCliente: {} };
    for (const [cliente, info] of Object.entries(clientesCarpetasHonorarios())) {
      const items = await listFolderChildrenHonorarios(info.folder);
      if (items === null) {
        result.porCliente[cliente] = { error: 'Carpeta no encontrada', folder: info.folder, prefijo: info.prefijo, pdfs: [] };
        result.summary.sinCarpeta++;
        continue;
      }
      const pdfs = items.filter(it => /\.pdf$/i.test(it.name));
      const detalle = pdfs.map(pdf => {
        const parsed = parsePDFNameHonorarios(pdf.name);
        const enExcel = pdfsRegistrados.has(pdf.name);
        let status = 'ok', hint = '', sugerencia = '';
        if (!parsed) {
          status = 'mal-nombrado';
          sugerencia = sugerirNombreHonorarios(info.prefijo, pdf.lastModifiedDateTime, '', '');
          const digMatch = pdf.name.match(/_(\d+)_/);
          const digitos = digMatch ? digMatch[1].length : null;
          if (digitos !== null && digitos !== 8) {
            hint = `La fecha tiene ${digitos} digitos en lugar de 8. Sugerido: ${sugerencia}`;
          } else {
            hint = `No cumple formato. Sugerido: ${sugerencia}`;
          }
          result.summary.malNombrados++;
        } else if (parsed.prefijo !== info.prefijo) {
          status = 'mal-nombrado';
          hint = `Prefijo "${parsed.prefijo}" no coincide con "${info.prefijo}" esperado`;
          result.summary.malNombrados++;
        } else if (!enExcel) {
          status = 'sin-registrar';
          hint = 'PDF no registrado en el Excel de honorarios';
          result.summary.sinRegistrar++;
        } else {
          result.summary.ok++;
        }
        return { ...pdf, parsed, enExcel, status, hint, sugerencia };
      });
      result.porCliente[cliente] = { folder: info.folder, prefijo: info.prefijo, pdfs: detalle };
    }
    auditHonorariosData = result;
    setStatus('✓ Auditoría de PDFs completada', 'ok');
  } catch (e) { showError('No se pudo auditar PDFs: ' + e.message); setStatus('Error','err'); }
  finally { auditingHonorarios = false; renderAll(); }
}

async function loadAll() {
  if (!account) { setStatus('Sin conexión', 'err'); return; }
  setStatus('Cargando…', 'wait');
  Object.keys(TABLES).forEach(k => { if (!rows[k]) rows[k] = []; if (!raw[k]) raw[k] = { headers: [], data: [], address: '' }; });
  facturas = facturas || [];

  let workbookOk = false;
  try { await openWorkbook(); workbookOk = true; }
  catch (e) { console.error('Excel gastos:', e); showError('Excel de gastos: ' + (e.message || e)); }

  if (workbookOk) {
    for (const [k, t] of Object.entries(TABLES)) {
      try { raw[k] = await readTable(t); rows[k] = raw[k].data; }
      catch (e) { console.warn('Tabla', t, ':', e.message); rows[k] = []; raw[k] = { headers: [], data: [], address: '' }; }
    }
    normalizeRows();
  }

  try { facturas = await loadHonorarios(); } catch (e) { console.warn('honorarios:', e); facturas = []; }

  populateMonthFilter();
  renderAll();

  const now = new Date();
  $('#headerSub').textContent = `Federico Ciancio · Actualizado ${now.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })}`;
  if (workbookOk && rows.transacciones.length > 0) setStatus('✓ Sincronizado', 'ok');
  else if (facturas.length > 0) setStatus('Parcial: solo honorarios', 'err');
  else setStatus('Error al cargar', 'err');
}
function normalizeRows() {
  rows.transacciones.forEach(r => {
    r.Importe = Number(r.Importe || 0); r.Mes = Number(r.Mes || 0); r.Año = Number(r.Año || 0);
    if (!r.Mes || !r.Año) { const d = excelDateToDate(r.Fecha); if (d) { r.Mes = d.getMonth() + 1; r.Año = d.getFullYear(); } }
  });
  rows.tarjetas.forEach(r => ['ImporteTotal','Reintegro','ImporteNeto','Cuotas','ValorCuota','CuotasRestantes'].forEach(f => r[f] = Number(r[f] || 0)));
  rows.cuotas.forEach(r => {
    r.MontoCuota = Number(r.MontoCuota || 0); r.Mes = Number(r.Mes || 0); r.Año = Number(r.Año || 0);
    // Algunas filas históricas no tienen Mes/Año cargados, pero sí MesPago como fecha serial de Excel.
    // Si no reconstruimos Mes/Año desde MesPago, el dashboard no puede imputar esas cuotas al mes seleccionado.
    if (!r.Mes || !r.Año) { const d = excelDateToDate(r.MesPago); if (d) { r.Mes = d.getMonth() + 1; r.Año = d.getFullYear(); } }
  });
  rows.deudas.forEach(r => r.Monto = Number(r.Monto || 0));
  rows.inversiones.forEach(r => ['Cantidad','PPC','PrecioActual','GananciaARS','TenenciaARS'].forEach(f => r[f] = Number(r[f] || 0)));
  rows.ahorro.forEach(r => { r.MontoObjetivo = Number(r.MontoObjetivo || 0); r.MontoAporte = Number(r.MontoAporte || 0); r.MontoActual = Number(r.MontoActual || r.MontoAporte || 0); });
  rows.fijos.forEach(r => { r.MontoEstimado = Number(r.MontoEstimado || 0); r.DíaVto = Number(r.DíaVto || 0); });
  rows.pagos.forEach(r => { r.MontoEstimado = Number(r.MontoEstimado || 0); r.MontoReal = Number(r.MontoReal || 0); r.Mes = Number(r.Mes || 0); r.Año = Number(r.Año || 0); });
  rows.tarjetasConfig.forEach(r => { r.DiaCierre = Number(r.DiaCierre || 0); r.DiaVencimiento = Number(r.DiaVencimiento || 0); r.Limite = Number(r.Limite || 0); });
  rows.resumenesTC.forEach(r => { r.Año = Number(r.Año || 0); r.Mes = Number(r.Mes || 0); r.MontoReal = Number(r.MontoReal || 0); });
}
function populateMonthFilter() {
  const keys = new Set();
  rows.transacciones.forEach(r => { if (r.Año && r.Mes) keys.add(monthKey(r.Año, r.Mes)); });
  rows.cuotas.forEach(r => { if (r.Año && r.Mes) keys.add(monthKey(r.Año, r.Mes)); });
  facturas.forEach(f => {
    const em = honorarioEmissionYM(f);
    if (em.y && em.m) keys.add(monthKey(em.y, em.m));
    if (f.anioPago && f.mesPago) keys.add(monthKey(f.anioPago, f.mesPago));
  });
  rows.pagos.forEach(r => { if (r.Año && r.Mes) keys.add(monthKey(r.Año, r.Mes)); });
  // Asegurar mes actual + 6 siguientes
  const now = new Date();
  for (let i = -3; i <= 6; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    keys.add(monthKey(d.getFullYear(), d.getMonth() + 1));
  }
  const sorted = [...keys].sort();
  const cur = monthKey(now.getFullYear(), now.getMonth() + 1);
  selectedMonth = selectedMonth || cur;
  $('#monthSelect').innerHTML = sorted.map(k => `<option value="${k}"${k === selectedMonth ? ' selected' : ''}>${labelMonthKey(k)}</option>`).join('');
}

function selMonth() {
  const [y, m] = (selectedMonth || '').split('-').map(Number);
  return {
    y, m,
    tx: rows.transacciones.filter(r => Number(r.Año) === y && Number(r.Mes) === m),
    cuotas: rows.cuotas.filter(r => Number(r.Año) === y && Number(r.Mes) === m),
    fijos: rows.fijos.filter(r => String(r.Activo || '').toUpperCase() === 'SI'),
    pagosMes: rows.pagos.filter(r => Number(r.Año) === y && Number(r.Mes) === m),
  };
}
function honorariosForMonth(y, m) {
  const yyyymm = y * 100 + m;
  const devengado = facturas.filter(f => f.tipo !== 'Desestimada' && honorarioEmissionKey(f) === yyyymm);
  const cobrado = facturas.filter(f => f.estado === 'Pagada' && f.anioPago === y && f.mesPago === m && f.tipo !== 'Desestimada');
  const porCobrar = facturas.filter(f => f.estado === 'Pendiente' && f.tipo !== 'Desestimada' && honorarioEmissionKey(f) <= yyyymm);
  return { devengado, cobrado, porCobrar };
}
// Mes de pago de la ultima cuota: aplica regla "resumen del mes X se paga el 1ro de X+1".
function mesPagoUltimaCuota(mesFinPagoSerial) {
  const fin = excelDateToDate(mesFinPagoSerial);
  if (!fin) return null;
  const d = new Date(fin.getFullYear(), fin.getMonth() + 1, 1);
  return { y: d.getFullYear(), m: d.getMonth() + 1 };
}
function diffMeses(y1, m1, y2, m2) { return (y2 - y1) * 12 + (m2 - m1); }
function cuotasTerminandoEn(y, m) {
  return rows.tarjetas.filter(r => {
    const p = mesPagoUltimaCuota(r.MesFinPago);
    return p && p.y === y && p.m === m && Number(r.CuotasRestantes || 0) > 0;
  });
}

function tipoFijo(f) {
  return String(f.TipoGastoFijo || '').trim();
}
function tarjetaRef(f) {
  return String(f.TarjetaRef || '').trim();
}
function fixedKey(s) {
  return String(s || '').trim().toLowerCase();
}
function tarjetaPlanilla(tarjeta, y, m) {
  return sum(rows.cuotas.filter(r => r.Tarjeta === tarjeta && Number(r.Año) === y && Number(r.Mes) === m), 'MontoCuota');
}
function vencimientoSerial(y, m, dia) {
  if (!dia) return '';
  const d = new Date(y, m - 1, Math.min(28, Number(dia)));
  return Math.round(d.getTime() / 86400000 + 25569);
}
function getPagoMesByConcepto(y, m) {
  const map = {};
  rows.pagos.filter(p => Number(p.Año) === y && Number(p.Mes) === m).forEach(p => {
    map[fixedKey(p.Concepto)] = p;
  });
  return map;
}
function pagosFijosView(y, m) {
  const pagosMap = getPagoMesByConcepto(y, m);
  const used = new Set();
  const out = [];
  rows.fijos.forEach(f => {
    const key = fixedKey(f.Concepto);
    const p = pagosMap[key];
    if (p) used.add(key);
    const isCard = tipoFijo(f) === 'TarjetaResumen';
    const tRef = tarjetaRef(f);
    const resumen = isCard ? findResumenReal(y, m, tRef) : null;
    const planilla = isCard ? tarjetaPlanilla(tRef, y, m) : Number((p ? p.MontoEstimado : f.MontoEstimado) || 0);
    const base = p || {
      __virtual: true,
      ID: null, Año: y, Mes: m,
      Concepto: f.Concepto,
      Categoría: f.Categoría || '',
      MontoEstimado: planilla,
      MontoReal: resumen ? Number(resumen.MontoReal || 0) : '',
      Moneda: f.Moneda || 'ARS',
      FechaVencimiento: vencimientoSerial(y, m, f.DíaVto),
      Estado: resumen ? (resumen.EstadoPago || 'Pendiente') : 'Pendiente',
      FechaPago: resumen ? (resumen.FechaPago || '') : '',
      MedioPago: resumen ? (resumen.MedioPago || f.MedioPago || '') : (f.MedioPago || ''),
      Notas: resumen ? (resumen.Notas || '') : (f.Notas || '')
    };
    out.push({
      ...base,
      __fromFijo: true,
      __fijoRowIndex: f.__rowIndex,
      __tipoFijo: tipoFijo(f),
      __tarjetaRef: tRef,
      __activoFijo: String(f.Activo || '').toUpperCase() === 'SI',
      __resumenRowIndex: resumen ? resumen.__rowIndex : null,
      MontoEstimado: planilla,
      MontoReal: isCard && resumen ? Number(resumen.MontoReal || 0) : base.MontoReal,
      Estado: isCard && resumen ? (resumen.EstadoPago || 'Pendiente') : base.Estado
    });
  });
  rows.pagos.filter(p => Number(p.Año) === y && Number(p.Mes) === m).forEach(p => {
    if (!used.has(fixedKey(p.Concepto))) out.push({ ...p, __fromFijo: false, __tipoFijo: '', __tarjetaRef: '' });
  });
  return out;
}
function resumenTarjetasMes(y, m) {
  const view = pagosFijosView(y, m);
  const cards = cardNames(false);
  return cards.map(tarjeta => {
    const planilla = tarjetaPlanilla(tarjeta, y, m);
    const resumen = findResumenReal(y, m, tarjeta);
    const pago = resumen || view.find(p => p.__tipoFijo === 'TarjetaResumen' && p.__tarjetaRef === tarjeta) ||
                 view.find(p => fixedKey(p.Concepto) === fixedKey('Resumen ' + tarjeta));
    const realRaw = pago ? Number((pago.MontoReal ?? 0) || 0) : 0;
    const hasReal = pago && pago.MontoReal !== '' && pago.MontoReal !== null && pago.MontoReal !== undefined && !isNaN(realRaw) && realRaw > 0;
    const delta = hasReal ? realRaw - planilla : 0;
    const pct = planilla ? Math.abs(delta) / planilla : (hasReal && realRaw ? 1 : 0);
    return { tarjeta, planilla, real: realRaw, hasReal, delta, pct, alerta: hasReal && pct > 0.05 };
  });
}
function resumenTarjetasWarnings(y, m) {
  return resumenTarjetasMes(y, m).filter(x => x.alerta);
}

function findResumenReal(y, m, tarjeta) {

async function upsertResumenReal(tarjeta, y, m, monto, estado = 'Pendiente', fechaPago = '', medioPago = '', notas = '') {
  const existing = findResumenReal(y, m, tarjeta);
  if (existing) {
    const r = resumenRowToExcelRow(existing.__rowIndex);
    await patchCell(SHEETS.resumenesTC, 'E' + r, Number(monto || 0));
    await patchCell(SHEETS.resumenesTC, 'F' + r, estado || 'Pendiente');
    await patchCell(SHEETS.resumenesTC, 'G' + r, fechaPago || '');
    await patchCell(SHEETS.resumenesTC, 'H' + r, medioPago || '');
    await patchCell(SHEETS.resumenesTC, 'I' + r, notas || '');
    Object.assign(existing, { MontoReal: Number(monto || 0), EstadoPago: estado || 'Pendiente', FechaPago: fechaPago || '', MedioPago: medioPago || '', Notas: notas || '' });
  } else {
    const row = [nextId(rows.resumenesTC || []), Number(y), Number(m), tarjeta, Number(monto || 0), estado || 'Pendiente', fechaPago || '', medioPago || '', notas || ''];
    const parts = a1Parts(raw.resumenesTC.address);
    const hasOnlyBlankRow = (parts.endRow - parts.startRow) >= 1 && (rows.resumenesTC || []).length === 0;
    const newRowIndex = hasOnlyBlankRow ? 1 : (parts.endRow - parts.startRow + 1);
    const wroteBlank = await writeFirstBlankDataRowIfAvailable('resumenesTC', row);
    if (!wroteBlank) await addRow(TABLES.resumenesTC, row);
    rows.resumenesTC.push({
      __rowIndex: newRowIndex, __address: raw.resumenesTC.address,
      ID: row[0], Año: row[1], Mes: row[2], Tarjeta: row[3], MontoReal: row[4],
      EstadoPago: row[5], FechaPago: row[6], MedioPago: row[7], Notas: row[8]
    });
  }
}
async function addPagoTarjetaMovimiento(tarjeta, fechaInput, monto, medio, notas) {
  const d = new Date(fechaInput + 'T00:00:00');
  const txRow = [
    nextId(rows.transacciones), dateToExcelSerial(fechaInput), 'Gasto', 'Pago tarjeta de crédito',

  ];

    Importe: txRow[5], Moneda: txRow[6], MedioPago: txRow[7], Notas: txRow[8], Mes: txRow[9], Año: txRow[10], Subcategoría: txRow[11]
  });
}

function ahorroTransaccionesResumen() {
  const arr = rows.transacciones.filter(r => r.Tipo === 'Gasto' && fixedKey(r.Categoría) === fixedKey('Ahorro / Inversiones'));
  let ars = arr.filter(r => String(r.Moneda || 'ARS').toUpperCase() === 'ARS').reduce((a,r)=>a+Number(r.Importe||0),0);
  let usd = arr.filter(r => String(r.Moneda || '').toUpperCase() === 'USD').reduce((a,r)=>a+Number(r.Importe||0),0);
  const metasActivas = (rows.ahorro || []).filter(r => String(r.Activa || 'SI').toUpperCase() === 'SI');
  const metasARS = metasActivas.filter(r => String(r.Moneda || 'ARS').toUpperCase() === 'ARS').reduce((a,r)=>a+Number(r.MontoActual || r.MontoAporte || 0),0);
  const metasUSD = metasActivas.filter(r => String(r.Moneda || '').toUpperCase() === 'USD').reduce((a,r)=>a+Number(r.MontoActual || r.MontoAporte || 0),0);
  ars += metasARS; usd += metasUSD;
  return { ars, usd, count: arr.length + metasActivas.length };
}
function deudaPendienteARS() {
  return rows.deudas.filter(r => r.Tipo === 'Por cobrar' && !['cobrada','pagada','anulada'].includes(String(r.Estado||'').toLowerCase()) && String(r.Moneda||'ARS').toUpperCase()==='ARS').reduce((a,r)=>a+Number(r.Monto||0),0)
       + rows.deudas.filter(r => r.Tipo === 'Por cobrar' && !['cobrada','pagada','anulada'].includes(String(r.Estado||'').toLowerCase()) && String(r.Moneda||'').toUpperCase()==='USD').reduce((a,r)=>a+Number(r.Monto||0)*Number(r.TipoCambio||0),0);

function renderKpis() {
  const { y, m, tx, cuotas } = selMonth();
  const { devengado, cobrado, porCobrar } = honorariosForMonth(y, m);
  const totalDeveng = sum(devengado, 'monto');
  const totalCobr = sum(cobrado, 'monto');
  const totalPorCobr = sum(porCobrar, 'monto');
  const otrosIng = sum(tx.filter(r => r.Tipo === 'Ingreso'), 'Importe');
  const gastosBase = gastosDirectosSinPagoTarjeta(tx);
  const gastos = sum(gastosBase, 'Importe');
  const cuotasMes = sum(cuotas, 'MontoCuota');
  const ingresosTotMes = totalCobr + otrosIng;  // dinero real entrado
  const saldo = ingresosTotMes - gastos - cuotasMes;
  const saldoCls = saldo >= 0 ? 'sage' : 'warm';

  const items = [
    { label: 'Cobrado en el mes',     value: fmtARS(totalCobr),    cls: 'sage',  vcls: 'sage',  hint: `${cobrado.length} factura(s) cobradas` },
    { label: 'Facturado / registrado', value: fmtARS(totalDeveng),  cls: 'slate', vcls: 'slate', hint: `${devengado.length} registro(s) emitidos/cargados` },
    { label: 'Por cobrar',            value: fmtARS(totalPorCobr), cls: 'warm',  vcls: 'warm',  hint: `${porCobrar.length} pendiente(s)` },
    { label: 'Gastos directos',       value: fmtARS(gastos),       cls: 'warm',  vcls: 'warm',  hint: `${gastosBase.length} mov. sin pagos TC` },
    { label: 'Cuotas TC del mes',     value: fmtARS(cuotasMes),    cls: 'mauve', vcls: 'mauve', hint: `${cuotas.length} cuota(s)` },
    { label: 'Saldo del mes',         value: fmtARS(saldo),        cls: saldoCls, vcls: saldoCls, hint: 'Cobrado − gastos − cuotas' }
  ];
  $('#kpis').innerHTML = items.map(x => `
    <div class="kpi ${x.cls}">
      <div class="kpi-label">${x.label}</div>
      <div class="kpi-value ${x.vcls}">${x.value}</div>
      ${x.hint ? `<div class="kpi-sub">${x.hint}</div>` : ''}
    </div>`).join('');
}

function renderNotices() {
  const { y, m } = selMonth();
  const terminando = cuotasTerminandoEn(y, m);
  const proximas = rows.tarjetas.filter(r => {
    const p = mesPagoUltimaCuota(r.MesFinPago);
    if (!p) return false;
    const d = diffMeses(y, m, p.y, p.m);
    return d >= 1 && d <= 2 && Number(r.CuotasRestantes || 0) > 0;
  });
  const warnings = resumenTarjetasWarnings(y, m);
  const out = [];
  if (warnings.length) {
    warnings.forEach(w => {
      out.push(`<div class="notice warn">
        <div><strong>⚠ Ojo:</strong> el resumen que llegó de la tarjeta <strong>${escapeHtml(w.tarjeta)}</strong> varía en <strong>${fmtARS(Math.abs(w.delta))}</strong> respecto a lo registrado por planilla. Revisá si faltan gastos por cargar.</div>
      </div>`);
    });
  }
  if (terminando.length) {
    const total = terminando.reduce((a, r) => a + Number(r.ValorCuota || 0), 0);
    out.push(`<div class="notice sage">
      <div>
        <strong>🎉 Se terminan de pagar este mes (${terminando.length}):</strong>
        ${terminando.map(r => `${escapeHtml(r.Descripción)} (${escapeHtml(r.Tarjeta)}, ${fmtARS(r.ValorCuota)})`).join(' · ')}
        <div style="margin-top:6px;font-size:12px;color:var(--text-soft)">Vas a dejar de pagar <strong>${fmtARS(total)}</strong>/mes.</div>
      </div>
    </div>`);
  }
  if (proximas.length) {
    out.push(`<div class="notice info">
      <strong>📅 Cuotas que terminan en los próximos 2 meses (${proximas.length}):</strong>
      ${proximas.map(r => `${escapeHtml(r.Descripción)} (${dateText(r.MesFinPago)})`).join(' · ')}
    </div>`);
  }
  $('#noticeArea').innerHTML = out.join('');
}

        ${auditHonorariosData.summary.malNombrados ? `<span class="badge badge-pendiente">⚠ ${auditHonorariosData.summary.malNombrados} mal nombrados</span>` : ''}
        ${auditHonorariosData.summary.sinRegistrar ? `<span class="badge badge-info">◯ ${auditHonorariosData.summary.sinRegistrar} sin registrar</span>` : ''}
        ${auditHonorariosData.summary.sinCarpeta ? `<span class="badge badge-anulada">◌ ${auditHonorariosData.summary.sinCarpeta} sin carpeta</span>` : ''}
      </div>
      ${Object.entries(auditHonorariosData.porCliente).map(([cliente,data]) => `
        <div style="margin-bottom:18px">
          <h3 style="font-size:16px;margin-bottom:4px">${escapeHtml(cliente)}</h3>
          <div style="font-size:11px;color:var(--text-muted);font-family:monospace;margin-bottom:8px">${escapeHtml(data.folder || '')}</div>
          ${data.error ? `<div class="notice warn">⚠ ${escapeHtml(data.error)}</div>` : ''}
          ${!data.error && data.pdfs.length === 0 ? `<p style="font-size:12px;color:var(--text-muted);font-style:italic">Sin PDFs.</p>` : ''}
          ${!data.error ? data.pdfs.map(pdf => `
            <div class="audit-item ${pdf.status === 'ok' ? 'ok' : (pdf.status === 'mal-nombrado' ? 'warn' : 'info')}">
              <div style="flex:1;min-width:0"><div style="font-family:monospace;font-size:12px;word-break:break-all">${escapeHtml(pdf.name)}</div>${pdf.hint ? `<div style="font-size:11px;color:var(--text-soft);margin-top:3px">${escapeHtml(pdf.hint)}</div>` : ''}</div>
              <div style="display:flex;gap:6px;flex-wrap:wrap">
                ${pdf.status === 'sin-registrar' && pdf.parsed ? `<button class="btn btn-success btn-sm" onclick="registrarPDFHonorarios('${escapeHtml(cliente)}','${escapeHtml(pdf.id)}')">＋ Registrar en Excel</button>` : ''}
                ${pdf.status === 'mal-nombrado' && pdf.sugerencia ? `<button class="btn btn-mauve btn-sm" onclick="renombrarPDFHonorarios('${escapeHtml(cliente)}','${escapeHtml(pdf.id)}','${escapeHtml(pdf.sugerencia)}')">✎ Renombrar</button>` : ''}
                ${pdf.webUrl ? `<a class="btn btn-outline btn-sm" href="${pdf.webUrl}" target="_blank" rel="noopener">Abrir</a>` : ''}
              </div>
            </div>
          `).join('') : ''}
        </div>
      `).join('')}
    </div>` : '';

  return `
    ${faltantes.length ? `<div class="notice warn">
      <div style="flex:1"><strong>⚠ Pendientes de emisión / registro en ${MES_NAMES[m-1]} ${y} — período ${servicePer.mesTxt} ${servicePer.y}:</strong><br>${faltantes.map(f=>escapeHtml(f.cliente)).join(' · ')}</div>
    </div>
    <div class="card" style="margin-bottom:18px">
      <div class="card-title">Acciones rápidas para clientes recurrentes sin registro</div>
      ${faltantes.map(f => `<div class="pending-item">
        <div><div class="pending-name">${escapeHtml(f.cliente)}</div><div class="pending-meta">${escapeHtml(f.mes)} ${f.anio}</div></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-success btn-sm" onclick="openIngresoHonorariosModal('${escapeHtml(f.cliente)}','${escapeHtml(f.mes)}',${f.anio})">＋ Registrar ingreso</button>
          <button class="btn btn-outline btn-sm" onclick="desestimarHonorarios('${escapeHtml(f.cliente)}','${escapeHtml(f.mes)}',${f.anio})">Desestimar</button>
        </div>
      </div>`).join('')}
    </div>` : ''}

    <div class="grid-3" style="margin-bottom:18px">
      <div class="kpi sage"><div class="kpi-label">Honorarios cobrados</div><div class="kpi-value sage">${fmtARS(totalCobrado)}</div><div class="kpi-sub">${cobrado.length} registro(s) con fecha de pago en ${MES_NAMES[m-1]} ${y}</div></div>
      <div class="kpi slate"><div class="kpi-label">Emitido / registrado en el mes</div><div class="kpi-value slate">${fmtARS(totalDevengado)}</div><div class="kpi-sub">${devengado.length} registro(s) con emisión/carga en ${MES_NAMES[m-1]} ${y}</div></div>
      <div class="kpi warm"><div class="kpi-label">Pendiente acumulado</div><div class="kpi-value warm">${fmtARS(totalPendiente)}</div><div class="kpi-sub">${porCobrar.length} registro(s) pendiente(s)</div></div>
    </div>

    <div class="grid-2" style="margin-bottom:18px">
      <div class="card"><div class="card-title">Facturas / ingresos emitidos o registrados en ${MES_NAMES[m-1]} ${y}</div>
        <div class="table-wrap"><table>
          <thead><tr><th>Categoría</th><th>Cliente / caso</th><th>Tipo</th><th>Estado</th><th>N°</th><th class="num">Monto</th><th>Acción</th></tr></thead>
          <tbody>
            ${ingresosPeriodo.length ? ingresosPeriodo.map(f => `<tr>
              <td><span class="badge badge-info">${escapeHtml(f.categoriaIngreso || inferCategoriaIngreso(f.cliente, f.notas, f.concepto))}</span></td>
              <td><strong>${escapeHtml(f.cliente)}</strong><div style="font-size:11px;color:var(--text-muted)">${escapeHtml(f.concepto || '')}<br><span style="font-size:10px">Período: ${f.mesTxt} ${f.anioServicio}${f.fechaEmision ? ` · Emisión: ${f.fechaEmision.toLocaleDateString('es-AR')}` : ''}</span></div></td>
              <td>${tipoBadge(f.tipo)}</td>
              <td>${estadoBadge(f.estado)}</td>
              <td style="font-family:monospace;font-size:12px">${escapeHtml(f.nroFactura || '')}</td>
              <td class="num">${fmtARS(f.monto)}</td>
              <td>
                ${f.estado === 'Pendiente' && f.tipo !== 'Desestimada' ? `<button class="btn btn-success btn-sm" onclick="marcarFacturaHonorarios(${f.rowExcel}, 'Pagada')">✓ Marcar pagada</button>` : ''}
                ${f.estado === 'Pagada' ? `<button class="btn btn-danger btn-sm" onclick="marcarFacturaHonorarios(${f.rowExcel}, 'Pendiente')">↩ Revertir</button>` : ''}
              </td>
            </tr>`).join('') : '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:18px">Sin registros para este período.</td></tr>'}
          </tbody>
        </table></div>
      </div>

      <div class="card"><div class="section-header"><div class="card-title" style="margin-bottom:0">Auditoría / carga automática de PDFs</div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-success btn-sm" onclick="openIngresoHonorariosLibreModal()">＋ Ingreso sin factura</button><button class="btn btn-slate btn-sm" onclick="auditarPDFsHonorarios()" ${auditingHonorarios ? 'disabled' : ''}>${auditingHonorarios ? 'Escaneando…' : 'Auditar PDFs'}</button></div></div>
        <p style="font-size:13px;color:var(--text-soft);line-height:1.6">Escanea las carpetas de facturación propia de cada cliente, detecta PDFs nuevos y permite cargarlos al Excel de honorarios. También podés cargar ingresos manuales sin factura propia.</p>
        <div style="margin-top:14px">
          <div class="pending-item"><div><div class="pending-name">Otros ingresos manuales del mes</div><div class="pending-meta">Cargados desde movimientos generales</div></div><div class="pending-amount sage">${fmtARS(totalOtros)}</div></div>
        </div>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:18px">
      <div class="card"><div class="card-title">Facturas cobradas en el mes</div>
        <div class="table-wrap"><table><thead><tr><th>Cliente</th><th>Período</th><th>N°</th><th class="num">Monto</th><th>Fecha pago</th></tr></thead><tbody>
          ${cobrado.length ? cobrado.map(f => `<tr><td><strong>${escapeHtml(f.cliente)}</strong></td><td>${f.mesTxt} ${f.anioServicio}</td><td>${escapeHtml(f.nroFactura||'')}</td><td class="num">${fmtARS(f.monto)}</td><td>${f.fechaPago ? f.fechaPago.toLocaleDateString('es-AR') : ''}</td></tr>`).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:18px">Sin facturas cobradas este mes.</td></tr>'}
        </tbody></table></div>
      </div>
      <div class="card"><div class="card-title">Otros ingresos cargados manualmente — ${MES_NAMES[m-1]} ${y}</div>
        ${(() => {
          // Mezclamos: transacciones Tipo='Ingreso' (carga directa) + facturas tipo='Sin Factura' cobradas
          // en el mes seleccionado. Asi el usuario ve TODO lo que cargo manualmente.
          const facturasSF = facturas.filter(f => f.tipo === 'Sin Factura' && f.estado === 'Pagada' && f.anioPago === y && f.mesPago === m).map(f => ({
            sortMs: f.fechaPago ? f.fechaPago.getTime() : 0,
            fecha: f.fechaPago ? f.fechaPago.toLocaleDateString('es-AR') : '',
            categoria: f.cliente,
            desc: f.concepto || ('Honorarios ' + f.mesTxt + ' ' + f.anioServicio),
            monto: Number(f.monto || 0),
            fuente: 'Sin factura'
          }));
          const otrosMix = otros.map(r => ({
            sortMs: excelDateToDate(r.Fecha)?.getTime() || 0,
            fecha: dateText(r.Fecha), categoria: r.Categoría || '', desc: r.Descripción || '',
            monto: Number(r.Importe || 0), fuente: 'Manual'
          }));
          const lista = [...facturasSF, ...otrosMix].sort((a,b)=> b.sortMs - a.sortMs);
          const total = lista.reduce((a,x)=>a+x.monto,0);
          return `<div style="font-family:'DM Serif Display';font-size:24px;margin-bottom:12px;color:var(--sage)">${fmtARS(total)}</div>
            <div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Origen</th><th>Categoría / cliente</th><th>Descripción</th><th class="num">Importe</th></tr></thead><tbody>
              ${lista.length ? lista.map(r => `<tr><td>${escapeHtml(r.fecha)}</td><td><span class="badge ${r.fuente==='Sin factura'?'badge-mauve':'badge-pagada'}">${r.fuente}</span></td><td><strong>${escapeHtml(r.categoria)}</strong></td><td>${escapeHtml(r.desc)}</td><td class="num">${fmtARS(r.monto)}</td></tr>`).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:18px">Sin ingresos manuales este mes.</td></tr>'}
            </tbody></table></div>`;
        })()}
      </div>
    </div>

    <div class="card" style="margin-bottom:18px"><div class="card-title">Pendientes de cobro acumulados</div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">Marcá como pagada directamente desde aca, sin importar el mes seleccionado arriba.</div>
      <div class="table-wrap"><table><thead><tr><th>Categoría</th><th>Cliente / caso</th><th>Período</th><th class="num">Monto</th><th>Acción</th></tr></thead><tbody>
        ${porCobrar.length ? porCobrar.map(f => `<tr><td><span class="badge badge-info">${escapeHtml(f.categoriaIngreso || inferCategoriaIngreso(f.cliente, f.notas, f.concepto))}</span></td><td><div><strong>${escapeHtml(f.cliente)}</strong></div>${f.concepto ? `<div style="font-size:11px;color:var(--text-muted)">${escapeHtml(f.concepto)}</div>` : ''}${f.tipo && f.tipo !== 'Propia' ? `<div style="margin-top:3px">${tipoBadge(f.tipo)}</div>` : ''}</td><td><strong>${f.mesTxt} ${f.anioServicio}</strong></td><td class="num"><strong>${fmtARS(f.monto)}</strong></td><td><button class="btn btn-success btn-sm" onclick="marcarFacturaHonorarios(${f.rowExcel}, 'Pagada')">✓ Marcar pagada</button></td></tr>`).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:18px">Sin pendientes 🎉</td></tr>'}
      </tbody></table></div>
    </div>

    <div class="card"><div class="card-title">Histórico mensual de ingresos</div>
      <div class="table-wrap"><table><thead><tr><th>Mes</th><th class="num">Honorarios cobrados</th><th class="num">Otros ingresos</th><th class="num">Total cobrado</th><th class="num">Emitido / registrado</th></tr></thead><tbody>
        ${ingresosHistoricos.map(r => `<tr><td><strong>${labelMonthKey(r.k)}</strong></td><td class="num">${fmtARS(r.honCob)}</td><td class="num">${fmtARS(r.manual)}</td><td class="num" style="font-weight:600;color:var(--sage)">${fmtARS(r.total)}</td><td class="num">${fmtARS(r.honDev)}</td></tr>`).join('')}
      </tbody></table></div>
    </div>
    ${auditHtml}`;
}


// ── TAB: PAGOS DEL MES ───────────────────────────────────────────────────
function renderPagosTab() {
  const { y, m } = selMonth();
  const pagosView = pagosFijosView(y, m);
  window._pagoView = pagosView;

  const activos = pagosView.filter(p => p.__activoFijo !== false || !p.__fromFijo);
  const pendientes = activos.filter(p => String(p.Estado).toLowerCase() !== 'pagado');
  const pagados    = activos.filter(p => String(p.Estado).toLowerCase() === 'pagado');
  const totalEstimado = activos.reduce((a,p)=>a+Number(p.MontoEstimado||0),0);
  const totalReal = activos.reduce((a,p)=>a+Number(p.MontoReal||0),0);
  const warnings = resumenTarjetasWarnings(y, m);

  const filaPago = (p, i) => {
    const isCard = p.__tipoFijo === 'TarjetaResumen';
    const estado = String(p.Estado || 'Pendiente').toLowerCase() === 'pagado';
    const disabledCls = p.__activoFijo === false && p.__fromFijo ? 'opacity:0.55' : '';
    return `<tr style="${disabledCls}">
      <td>
        <strong>${escapeHtml(p.Concepto)}</strong>
        ${isCard ? `<div class="pending-meta">Resumen por planilla: ${escapeHtml(p.__tarjetaRef || '')}</div>` : ''}
        ${p.__virtual ? `<div class="pending-meta">Aún no guardado para este mes</div>` : ''}
      </td>
      <td>${escapeHtml(p.Categoría || '')}</td>
      <td>${dateText(p.FechaVencimiento)}</td>
      <td class="num">
        ${isCard
          ? `<span style="font-weight:600">${fmtARS(p.MontoEstimado)}</span><div class="pending-meta">resumen por planilla</div>`
          : `<input id="est_${i}" type="number" class="form-input" style="width:130px;text-align:right" value="${Number(p.MontoEstimado || 0)}">`}
      </td>
      <td class="num">
        <input id="real_${i}" type="number" class="form-input" style="width:140px;text-align:right" value="${p.MontoReal ? Number(p.MontoReal) : ''}" placeholder="${isCard ? 'Monto resumen real' : 'Monto pagado'}">
      </td>
      <td>${estado ? '<span class="badge badge-pagada">Pagado</span>' : '<span class="badge badge-pendiente">Pendiente</span>'}</td>
      <td>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${isCard ? `<button class="btn btn-outline btn-sm" onclick="openResumenRealModal(decodeURIComponent('${encodeURIComponent(p.__tarjetaRef)}'))">${p.MontoReal ? 'Editar resumen real' : 'Cargar resumen real'}</button>` : `<button class="btn btn-outline btn-sm" onclick="savePagoFromView(${i}, false)">Guardar</button>`}
          ${estado
            ? `<button class="btn btn-danger btn-sm" onclick="savePagoFromView(${i}, false, 'Pendiente')">↩ Pendiente</button>`
            : `<button class="btn btn-success btn-sm" onclick="savePagoFromView(${i}, true)">✓ Pagado</button>`}
        </div>
      </td>
    </tr>`;
  };

  return `
    <div class="grid-3" style="margin-bottom:16px">
      <div class="kpi sand">
        <div class="kpi-label">Gastos fijos esperados</div>
        <div class="kpi-value">${fmtARS(totalEstimado)}</div>
        <div class="kpi-sub">${activos.length} concepto(s) para ${MES_NAMES[m-1]}</div>
      </div>
      <div class="kpi warm">
        <div class="kpi-label">Pendientes este mes</div>
        <div class="kpi-value warm">${fmtARS(pendientes.reduce((a,p)=>a+Number(p.MontoEstimado||0),0))}</div>
        <div class="kpi-sub">${pendientes.length} pago(s)</div>
      </div>
      <div class="kpi sage">
        <div class="kpi-label">Monto real cargado</div>
        <div class="kpi-value sage">${fmtARS(totalReal)}</div>
        <div class="kpi-sub">${pagados.length} pagado(s)</div>
      </div>
    </div>

    ${warnings.length ? warnings.map(w => `
      <div class="notice warn">
        <div><strong>⚠ Ojo:</strong> el resumen que llegó de la tarjeta <strong>${escapeHtml(w.tarjeta)}</strong> varía en <strong>${fmtARS(Math.abs(w.delta))}</strong> respecto al registrado por planilla. Ver gastos que faltan cargar.</div>
      </div>`).join('') : ''}

    <div class="card" style="margin-bottom:18px">
      <div class="section-header">
        <h3>Gastos fijos y pagos del mes — ${MES_NAMES[m-1]} ${y}</h3>
        <button class="btn btn-cta btn-sm" onclick="openPagoModal()">+ Registrar pago extra</button>
      </div>
      <p style="font-size:12px;color:var(--text-soft);margin-bottom:12px">
        Los gastos fijos aparecen automáticamente en cada mes. Para tarjetas, el campo “Resumen por planilla” se calcula con las cuotas cargadas, y “Monto resumen real” lo completás cuando llega el resumen.
      </p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Concepto</th><th>Categoría</th><th>Vto.</th>
              <th class="num">Planilla / estimado</th><th class="num">Monto real</th><th>Estado</th><th>Acción</th>
            </tr>
          </thead>
          <tbody>
            ${activos.length ? activos.map(filaPago).join('') : '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:20px">Sin gastos fijos configurados.</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="section-header">
        <h3>Gastos fijos configurados</h3>
        <button class="btn btn-outline btn-sm" onclick="openFijoModal()">+ Agregar gasto fijo</button>
      </div>
      <p style="font-size:12px;color:var(--text-soft);margin-bottom:10px">Desactivar no borra los pagos ya guardados en meses anteriores; solo evita que el concepto siga apareciendo como gasto fijo activo.</p>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Concepto</th><th>Categoría</th><th class="num">Estimado</th><th>Día vto.</th><th>Medio</th><th>Tipo</th><th>Activo</th><th>Acción</th></tr></thead>
          <tbody>
            ${rows.fijos.map(r => {
              const activo = String(r.Activo).toUpperCase() === 'SI';
              return `<tr>
                <td><strong>${escapeHtml(r.Concepto)}</strong>${r.TarjetaRef ? `<div class="pending-meta">${escapeHtml(r.TarjetaRef)}</div>` : ''}</td>
                <td>${escapeHtml(r.Categoría || '')}</td>
                <td class="num">${r.MontoEstimado ? fmtARS(r.MontoEstimado) : '<span style="color:var(--text-muted)">—</span>'}</td>
                <td>${r.DíaVto || ''}</td>
                <td>${escapeHtml(r.MedioPago || '')}</td>
                <td>${r.TipoGastoFijo === 'TarjetaResumen' ? '<span class="badge badge-mauve">Tarjeta</span>' : '<span class="badge badge-info">Normal</span>'}</td>
                <td>${activo ? '<span class="badge badge-pagada">Activo</span>' : '<span class="badge badge-anulada">Inactivo</span>'}</td>
                <td><div style="display:flex;gap:6px;flex-wrap:wrap">
                  <button class="btn btn-outline btn-sm" onclick="openFijoModal(${r.__rowIndex})">Editar</button>
                  ${activo
                    ? `<button class="btn btn-danger btn-sm" onclick="toggleFijoActivo(${r.__rowIndex}, 'NO')">Desactivar</button>`
                    : `<button class="btn btn-success btn-sm" onclick="toggleFijoActivo(${r.__rowIndex}, 'SI')">Reactivar</button>`}
                </div></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

// ── TAB: TARJETAS ────────────────────────────────────────────────────────
function renderTarjetasTab() {
  const { y, m, cuotas } = selMonth();
  const cardsAll = cardNames(false);
  const resumenReal = resumenTarjetasMes(y, m).filter(r => cardsAll.includes(r.tarjeta));
  const cuotasPorTarjeta = cardsAll.map((c,i) => ({
    tarjeta: c,
    color: cardColor(c,i),
    monto: sum(cuotas.filter(r => r.Tarjeta === c), 'MontoCuota'),
    cuotas: cuotas.filter(r => r.Tarjeta === c).length,
    pendiente: rows.tarjetas.filter(r => r.Tarjeta === c && Number(r.CuotasRestantes || 0) > 0).reduce((a, r) => a + (Number(r.ValorCuota) * Number(r.CuotasRestantes)), 0)
  }));
  const totalMes = cuotasPorTarjeta.reduce((a, x) => a + x.monto, 0);
  const totalPendiente = cuotasPorTarjeta.reduce((a, x) => a + x.pendiente, 0);
  const pendiendoCompras = rows.tarjetas.filter(r => Number(r.CuotasRestantes || 0) > 0).sort((a, b) => Number(a.CuotasRestantes || 999) - Number(b.CuotasRestantes || 999));
  return `
    <div class="grid-3" style="margin-bottom:18px">
      <div class="kpi mauve"><div class="kpi-label">A pagar por planilla</div><div class="kpi-value mauve">${fmtARS(totalMes)}</div><div class="kpi-sub">${cuotas.length} cuota(s) en ${cardsAll.length} tarjeta(s)</div></div>
      <div class="kpi sand"><div class="kpi-label">Total pendiente</div><div class="kpi-value">${fmtARS(totalPendiente)}</div><div class="kpi-sub">${pendiendoCompras.length} compra(s) en cuotas</div></div>
      <div class="kpi sage"><div class="kpi-label">Resumen real cargado</div><div class="kpi-value sage">${fmtARS(resumenReal.reduce((a,r)=>a+(r.hasReal?r.real:0),0))}</div><div class="kpi-sub">${resumenReal.filter(r=>r.hasReal).length} tarjeta(s) con resumen real</div></div>
    </div>
    <div class="card" style="margin-bottom:18px">
      <div class="card-title">Monto a pagar por tarjeta — ${MES_NAMES[m-1]} ${y}</div>
      <div class="kpis kpis-cards" style="margin-bottom:0">${cuotasPorTarjeta.map(c=>`<div class="kpi" style="border-top:3px solid ${c.color}"><div class="kpi-label">${escapeHtml(c.tarjeta)}</div><div class="kpi-value" style="color:${c.color}">${fmtARS(c.monto)}</div><div class="kpi-sub">${c.cuotas} cuota(s)</div></div>`).join('')}</div>
    </div>
    <div class="card" style="margin-bottom:18px">
      <div class="card-title">Control de resumen real vs planilla — ${MES_NAMES[m-1]} ${y}</div>
      <div class="table-wrap"><table><thead><tr><th>Tarjeta</th><th class="num">Resumen por planilla</th><th class="num">Monto resumen real</th><th class="num">Diferencia</th><th>Estado</th><th>Acción</th></tr></thead><tbody>

function renderFlujoTab() {
  return `
    <div class="card" style="margin-bottom:18px">

      <div class="chart-box tall"><canvas id="flujoChart"></canvas></div>
    </div>

      <div class="card-title">Comparativa mes a mes</div>
      <div class="table-wrap" id="flujoTable"></div>
    </div>`;
}
function drawFlujoCharts() {
  const keys = new Set();
  rows.transacciones.forEach(r => { if (r.Año && r.Mes) keys.add(monthKey(r.Año, r.Mes)); });
  rows.cuotas.forEach(r => { if (r.Año && r.Mes) keys.add(monthKey(r.Año, r.Mes)); });
  facturas.forEach(f => { if (f.tipo === 'Desestimada') return; if (f.anioServicio && f.mesServicio) keys.add(monthKey(f.anioServicio, f.mesServicio)); if (f.anioPago && f.mesPago) keys.add(monthKey(f.anioPago, f.mesPago)); });
  const sorted = [...keys].filter(k => !k.includes('undefined')).sort().slice(-12);
  const cobrSerie = sorted.map(k => { const [yy, mm] = k.split('-').map(Number); return sum(facturas.filter(f => f.estado === 'Pagada' && f.anioPago === yy && f.mesPago === mm && f.tipo !== 'Desestimada'), 'monto'); });
  const devSerie  = sorted.map(k => { const [yy, mm] = k.split('-').map(Number); return sum(facturas.filter(f => honorarioEmissionKey(f) === yy * 100 + mm && f.tipo !== 'Desestimada'), 'monto'); });
  const otrosSerie = sorted.map(k => { const [yy, mm] = k.split('-').map(Number); return sum(rows.transacciones.filter(r => r.Tipo === 'Ingreso' && r.Año === yy && r.Mes === mm), 'Importe'); });
  const gastoSerie = sorted.map(k => { const [yy, mm] = k.split('-').map(Number); return sum(rows.transacciones.filter(r => r.Tipo === 'Gasto' && !isPagoTarjeta(r) && r.Año === yy && r.Mes === mm), 'Importe'); });
  const cuotaSerie = sorted.map(k => { const [yy, mm] = k.split('-').map(Number); return sum(rows.cuotas.filter(r => r.Año === yy && r.Mes === mm), 'MontoCuota'); });
  const saldoSerie = sorted.map((_, i) => (cobrSerie[i] + otrosSerie[i]) - gastoSerie[i] - cuotaSerie[i]);

  charts.flujo = new Chart(document.getElementById('flujoChart'), {
    type: 'bar',
    data: {
      labels: sorted.map(labelMonthKey),
      datasets: [
        { label: 'Devengado',     data: devSerie,   backgroundColor: 'rgba(107,140,174,0.3)',  borderRadius: 4, order: 3 },
        { label: 'Cobrado',       data: cobrSerie,  backgroundColor: 'rgba(122,166,138,0.85)', borderRadius: 4, order: 2 },
        { label: 'Otros ingresos',data: otrosSerie, backgroundColor: 'rgba(155,134,168,0.85)', borderRadius: 4, order: 2 },
        { label: 'Gastos + cuotas',data: sorted.map((_,i)=>gastoSerie[i]+cuotaSerie[i]), backgroundColor: 'rgba(212,133,106,0.85)', borderRadius: 4, order: 2 },
        { label: 'Saldo',         data: saldoSerie, type: 'line', borderColor: '#c4a882', backgroundColor: '#c4a882', tension: 0.3, pointRadius: 4, borderWidth: 2, order: 1 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
      plugins: { legend: { position: 'bottom', labels: { color: '#7a6f65', boxWidth: 12, font: { size: 11 } } } },
      scales: { x: { ticks: { color: '#b0a89e', font: { size: 10 } }, grid: { color: '#e8e4dc' } },
                y: { ticks: { color: '#b0a89e', font: { size: 10 }, callback: v => fmtARS(v) }, grid: { color: '#e8e4dc' } } } }
  });

  const filas = sorted.map((k, i) => ({ Mes: labelMonthKey(k), Devengado: devSerie[i], Cobrado: cobrSerie[i], 'Otros ing.': otrosSerie[i], Gastos: gastoSerie[i], 'Cuotas TC': cuotaSerie[i], Saldo: saldoSerie[i] })).reverse();
  $('#flujoTable').innerHTML = `
    <table>
      <thead><tr><th>Mes</th><th class="num">Emitido / registrado</th><th class="num">Cobrado</th><th class="num">Otros ing.</th><th class="num">Gastos</th><th class="num">Cuotas TC</th><th class="num">Saldo</th></tr></thead>
      <tbody>${filas.map(f => `<tr>
        <td><strong>${f.Mes}</strong></td>
        <td class="num">${fmtARS(f.Devengado)}</td>
        <td class="num">${fmtARS(f.Cobrado)}</td>
        <td class="num">${fmtARS(f['Otros ing.'])}</td>
        <td class="num">${fmtARS(f.Gastos)}</td>
        <td class="num">${fmtARS(f['Cuotas TC'])}</td>
        <td class="num" style="color:${f.Saldo>=0?'var(--sage)':'var(--warm)'};font-weight:600">${fmtARS(f.Saldo)}</td>
      </tr>`).join('')}</tbody>
    </table>`;
}

// ── DATA: gastos categorizados del mes ────────────────────────────────────
function gastosCategorizadosDelMes() {
  const { tx, cuotas } = selMonth();
  const gastosDirectos = (tx || [])
    .filter(r => r.Tipo === 'Gasto' && !isPagoTarjeta(r))
    .map(r => ({
      Origen: 'Movimiento',
      Categoría: r.Categoría || 'Otros',
      Subcategoría: r.Subcategoría || 'Sin subcategoría',
      Descripción: r.Descripción || '',
      Importe: Number(r.Importe || 0)
    }));

  // Las cuotas de tarjeta se imputan a la categoría/subcategoría del consumo original.
  // El pago del resumen de tarjeta NO se incluye acá para evitar duplicar: sirve como flujo de caja,
  // pero el análisis de gasto debe mostrar en qué se consumió realmente.
  const comprasById = new Map((rows.tarjetas || []).map(t => [String(t.IDCompra || ''), t]));
  const cuotasTarjeta = (cuotas || []).map(c => {
    const compra = comprasById.get(String(c.IDCompra || '')) || {};
    return {
      Origen: 'Tarjeta',
      Categoría: compra.Categoría || 'Otros',
      Subcategoría: compra.Subcategoría || 'Sin subcategoría',
      Descripción: c.Descripción || compra.Descripción || '',
      Importe: Number(c.MontoCuota || 0),
      Tarjeta: c.Tarjeta || compra.Tarjeta || ''
    };
  }).filter(r => Number(r.Importe || 0) !== 0);

  return gastosDirectos.concat(cuotasTarjeta);
}

}
