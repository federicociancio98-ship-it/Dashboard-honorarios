function drawCategoriasCharts() {
  const gastos = gastosCategorizadosDelMes();
  const total = sum(gastos, 'Importe');
  const gs = groupSum(gastos, 'Categoría', 'Importe');
  // Detalle por categoría/subcategoría para evitar mezclar, por ejemplo, "General" de categorías distintas.
  const sub = (() => {
    const m = {};
    gastos.forEach(r => {
      const k = `${r.Categoría || 'Otros'} · ${r.Subcategoría || 'Sin subcategoría'}`;
      m[k] = (m[k] || 0) + Number(r.Importe || 0);
    });
    return Object.entries(m).map(([key, value]) => ({ key, value })).sort((a,b)=>b.value-a.value);
  })();

  if (!gs.length || !total) {
    renderEmptyChartMessage('catDonut', 'Sin gastos imputados para el mes seleccionado.');
    renderEmptyChartMessage('catBars', 'Sin gastos imputados para el mes seleccionado.');
  } else {
    charts.catDonut = new Chart(document.getElementById('catDonut'), {
      type: 'doughnut',
      data: { labels: gs.map(x => x.key), datasets: [{ data: gs.map(x => x.value), backgroundColor: COLORS_PALETTE.concat(COLORS_PALETTE, COLORS_PALETTE), borderWidth: 1.5, borderColor: '#fff' }] },
      options: donutOptions()
    });
    charts.catBars = new Chart(document.getElementById('catBars'), {
      type: 'bar', data: { labels: gs.map(x => x.key), datasets: [{ data: gs.map(x => x.value), backgroundColor: gs.map((_, i) => COLORS_PALETTE[i % COLORS_PALETTE.length]), borderRadius: 4 }] },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#b0a89e', font: { size: 10 }, callback: v => fmtARS(v) }, grid: { color: '#e8e4dc' } }, y: { ticks: { color: '#b0a89e', font: { size: 10 } }, grid: { display: false } } } }
    });
  }

  $('#catTable').innerHTML = `<div class="table-wrap"><table><thead><tr><th>Categoría</th><th class="num">Monto</th><th class="num">% total</th></tr></thead><tbody>${gs.map(x => `<tr><td><strong>${escapeHtml(x.key)}</strong></td><td class="num">${fmtARS(x.value)}</td><td class="num">${total ? fmtPct(x.value / total * 100) : '—'}</td></tr>`).join('') || '<tr><td colspan="3" style="text-align:center;color:var(--text-muted);padding:20px">Sin gastos.</td></tr>'}</tbody></table></div>`;
  $('#subcatTable').innerHTML = `<div class="table-wrap"><table><thead><tr><th>Categoría / Subcategoría</th><th class="num">Monto</th><th class="num">% total</th></tr></thead><tbody>${sub.map(x => `<tr><td>${escapeHtml(x.key)}</td><td class="num">${fmtARS(x.value)}</td><td class="num">${total ? fmtPct(x.value / total * 100) : '—'}</td></tr>`).join('') || '<tr><td colspan="3" style="text-align:center;color:var(--text-muted);padding:20px">Sin subcategorías.</td></tr>'}</tbody></table></div>`;
}

function closeModal() { $('#modalRoot').innerHTML = ''; }

async function patchCells(sheet, updates) {
  const key = keyFromSheetName(sheet);
  const ws = key ? ensureSheetForKey(key) : (gastosWorkbook.Sheets[sheet] || (gastosWorkbook.SheetNames.push(sheet), gastosWorkbook.Sheets[sheet] = XLSX.utils.aoa_to_sheet([[]])));
  for (const [addr, val] of updates) {
    const parts = a1Parts(addr);
    setCell(ws, parts.startRow, parts.startColNum, val);
  }
  await saveGastosWorkbook();
}
function excelRowFromIndex(key, rowIndex) { return parseStartRow(raw[key].address) + Number(rowIndex); }
async function addAporteToMeta(rowIndex, monto, fechaInput) {
  const r = rows.ahorro.find(x => Number(x.__rowIndex) === Number(rowIndex)); if (!r) return;
  const excelRow = excelRowFromIndex('ahorro', rowIndex);
  const actual = Number(r.MontoActual || r.MontoAporte || 0) + Number(monto || 0);
  await patchCell(SHEETS.ahorro, 'F' + excelRow, dateToExcelSerial(fechaInput || todayInputValue()));
  await patchCell(SHEETS.ahorro, 'G' + excelRow, actual);
  await patchCell(SHEETS.ahorro, 'J' + excelRow, actual);
  if (Number(r.MontoObjetivo||0) && actual >= Number(r.MontoObjetivo)) await patchCell(SHEETS.ahorro, 'H' + excelRow, 'Cumplida');
}
function openMetaModal(rowIndex=null) {
  const r = rowIndex ? rows.ahorro.find(x => x.__rowIndex === rowIndex) : null;

  $('#metaForm').addEventListener('submit', async ev => { ev.preventDefault(); const fd=Object.fromEntries(new FormData(ev.target)); setStatus('Guardando meta…','wait'); try { if (r) { const er=excelRowFromIndex('ahorro', rowIndex); await patchCells(SHEETS.ahorro, [['B'+er,fd.meta],['C'+er,fd.moneda],['D'+er,Number(fd.objetivo)],['E'+er,fd.fecha?dateToExcelSerial(fd.fecha):''],['G'+er,Number(fd.actual||0)],['H'+er,Number(fd.actual||0)>=Number(fd.objetivo||0)?'Cumplida':'En curso'],['I'+er,fd.notas||''],['J'+er,Number(fd.actual||0)],['K'+er,'SI']]); } else { await addRow(TABLES.ahorro, [nextId(rows.ahorro),fd.meta,fd.moneda,Number(fd.objetivo),fd.fecha?dateToExcelSerial(fd.fecha):'', '', Number(fd.actual||0), Number(fd.actual||0)>=Number(fd.objetivo||0)?'Cumplida':'En curso', fd.notas||'', Number(fd.actual||0),'SI']); } closeModal(); await loadAll(); } catch(e){showError('No se pudo guardar la meta: '+e.message); setStatus('Error','err');} });
}
async function deleteMeta(rowIndex) {
  const r = rows.ahorro.find(x => Number(x.__rowIndex) === Number(rowIndex));
  if (!r) return;
  if (!confirm(`¿Eliminar la meta "${r.Meta}"? Los aportes ya cargados NO se borran; solo se oculta la meta.`)) return;
  const er = excelRowFromIndex('ahorro', rowIndex);
  setStatus('Eliminando meta…','wait');
  try {
    await patchCell(SHEETS.ahorro, 'K' + er, 'NO');
    r.Activa = 'NO';
    closeModal();
    renderAll();
    setStatus('✓ Meta eliminada', 'ok');
  } catch(e) { showError('No se pudo eliminar la meta: ' + e.message); setStatus('Error','err'); }

tidad||0), ppc=Number(fd.ppc||0), precio=Number(fd.precio||0); const gan=(precio-ppc)*cant; const ten=precio*cant; try{ if(r){ const er=excelRowFromIndex('inversiones',rowIndex); await patchCells(SHEETS.inversiones,[['B'+er,dateToExcelSerial(fd.fecha||todayInputValue())],['D'+er,fd.tipo],['E'+er,fd.ticker],['F'+er,cant],['G'+er,ppc],['H'+er,precio],['I'+er,gan],['J'+er,ten],['K'+er,fd.moneda],['L'+er,fd.notas||''],['M'+er,'Activa']]); } else { await addRow(TABLES.inversiones,[nextId(rows.inversiones),dateToExcelSerial(fd.fecha||todayInputValue()),'Sin definir',fd.tipo,fd.ticker,cant,ppc,precio,gan,ten,fd.moneda,fd.notas||'','Activa']); } closeModal(); await loadAll(); }catch(e){showError('No se pudo guardar inversión: '+e.message);} }); }

window.updateSubcatSelect = function(sel) {

function openSimpleModal(kind, medioInicial) {
  const cats = kind === 'Ingreso' ? CATEGORIAS_INGRESO : CATEGORIAS_GASTO;
  const firstCat = cats[0];
  $('#modalRoot').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <h2>${kind === 'Ingreso' ? 'Cargar ingreso' : 'Cargar gasto'}</h2>

        <form id="txFormNew">
          <div class="form-row">
            <div class="form-group"><label>Fecha</label><input type="date" name="fecha" value="${todayInputValue()}" required></div>
            <div class="form-group"><label>Medio de pago</label><select name="medio">
              ${kind === 'Gasto' ? MEDIOS_PAGO_NO_TC.map(o => `<option ${o === medioInicial ? 'selected' : ''}>${o}</option>`).join('') : ['Transferencia','Efectivo','MercadoPago','Sin especificar'].map(o => `<option ${o === medioInicial ? 'selected' : ''}>${o}</option>`).join('')}
            </select></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Categoría</label><select name="categoria" required onchange="updateSubcatSelect(this)">${cats.map(c => `<option>${c}</option>`).join('')}</select></div>
            <div class="form-group"><label>Subcategoría</label><select name="subcategoria">${kind==='Gasto' ? subcatOptions(firstCat) : '<option></option>'}</select></div>
          </div>
          <div class="form-group" id="txCardSelector" style="display:none"><label>Tarjeta pagada</label><select name="tarjeta">${cardNames(false).map(c => `<option>${escapeHtml(c)}</option>`).join('')}</select></div>
          <div class="form-group" id="txAhorroSelector" style="display:none"><label>Meta de ahorro / destino</label><select name="metaAhorro"><option value="">Sin meta específica</option>${ahorroGoalsOptions()}</select><div style="font-size:11px;color:var(--text-muted);margin-top:4px">Si elegís una meta, el aporte se acumula automáticamente en esa meta.</div></div>
          <div class="form-group"><label>Descripción</label><input type="text" name="descripcion" placeholder="Ej: Mueble, Pago resumen BBVA, Aporte viaje"></div>
          <div class="form-row">
            <div class="form-group"><label>Importe</label><input type="number" name="importe" step="0.01" required></div>
            <div class="form-group"><label>Moneda</label><select name="moneda" onchange="toggleCotizacion(this)"><option>ARS</option><option>USD</option></select></div>
          </div>
          <div class="form-row" id="cotizGroup" style="display:none">
            <div class="form-group"><label>Cotización (ARS por USD)</label><input type="number" name="cotizacion" step="0.01" placeholder="Ej: 1190"></div>
            <div class="form-group"><label>Pesos efectivamente gastados</label><div id="cotizCalc" style="padding:9px 13px;border-radius:var(--radius-sm);background:var(--surface2);font-family:'DM Serif Display';font-size:18px;color:var(--text-soft)">$ —</div></div>
          </div>
          <div class="form-group"><label>Notas (opcional)</label><input type="text" name="notas"></div>
          <div class="modal-actions"><button type="button" class="btn btn-outline" onclick="closeModal()">Cancelar</button><button type="submit" class="btn btn-success">Guardar</button></div>
        </form>
      </div>
    </div>`;
  updateSubcatSelect($('#txFormNew [name="categoria"]'));
  // Cotizacion: mostrar/ocultar y recalcular pesos efectivos en tiempo real.
  const monedaEl = $('#txFormNew [name="moneda"]');
  const cotizEl = $('#txFormNew [name="cotizacion"]');
  const importeEl = $('#txFormNew [name="importe"]');
  const cotizGroup = document.getElementById('cotizGroup');
  const cotizCalc = document.getElementById('cotizCalc');
  function refreshCotiz() {
    const isUsd = monedaEl.value === 'USD';
    cotizGroup.style.display = isUsd ? '' : 'none';
    if (isUsd) {
      const c = Number(cotizEl?.value || 0);
      const imp = Number(importeEl?.value || 0);
      cotizCalc.textContent = c > 0 && imp > 0 ? fmtARS(c * imp) : '$ —';
    }
  }
  monedaEl.addEventListener('change', refreshCotiz);
  cotizEl?.addEventListener('input', refreshCotiz);
  importeEl?.addEventListener('input', refreshCotiz);

  $('#txFormNew').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target));
    const d = new Date(fd.fecha + 'T00:00:00');
    const desc = fd.descripcion || (fd.categoria === 'Pago tarjeta de crédito' && fd.tarjeta ? ('Pago resumen ' + fd.tarjeta) : (fd.categoria === 'Ahorro / Inversiones' ? 'Aporte ahorro / inversión' : ''));
    // Si la moneda es USD y se ingreso cotizacion, registramos DOS filas: una en
    // pesos (lo que efectivamente salio de la cuenta) y otra USD informativa via
    // notas — asi el egreso del mes queda en ARS y el resumen de ahorros queda
    // bien (no contamos "100 ARS" cuando en realidad fueron "100 USD comprados").
    let row, extraNotaMov, extraRowsAhorro = null;
    if (fd.moneda === 'USD' && Number(fd.cotizacion || 0) > 0 && kind === 'Gasto') {
      const usdCount = Number(fd.importe || 0);
      const cotiz = Number(fd.cotizacion);
      const arsSpent = usdCount * cotiz;
      extraNotaMov = `Compra USD ${usdCount} @ ${fmtARS(cotiz)}/USD. ${fd.notas || ''}`.trim();
      row = [nextId(rows.transacciones), dateToExcelSerial(fd.fecha), kind, fd.categoria, desc || `Compra USD ${usdCount}`, arsSpent, 'ARS', fd.medio, extraNotaMov, d.getMonth() + 1, d.getFullYear(), fd.subcategoria || 'Dólares / moneda extranjera'];
      // Si NO hay meta especifica, igualmente registramos un aporte USD a una
      // meta virtual "Dolares" (creandola al vuelo si no existe).
      if (!fd.metaAhorro && fd.categoria === 'Ahorro / Inversiones') {
        const existing = (rows.ahorro || []).find(r => fixedKey(r.Meta) === fixedKey('Dolares ahorrados') && String(r.Moneda || '').toUpperCase() === 'USD');
        if (existing) {
          extraRowsAhorro = { rowIndex: existing.__rowIndex, usdCount };
        } else {
          extraRowsAhorro = { newMeta: true, usdCount };
        }
      }
    } else {
      row = [nextId(rows.transacciones), dateToExcelSerial(fd.fecha), kind, fd.categoria, desc, Number(fd.importe), fd.moneda, fd.medio, fd.notas || '', d.getMonth() + 1, d.getFullYear(), fd.subcategoria || ''];
    }
    setStatus('Guardando…', 'wait');
    try {
      await addRow(TABLES.transacciones, row);
      if (kind === 'Gasto' && fd.categoria === 'Pago tarjeta de crédito' && fd.tarjeta) {
        await upsertResumenReal(fd.tarjeta, d.getFullYear(), d.getMonth() + 1, Number(fd.importe), 'Pagado', dateToExcelSerial(fd.fecha), fd.medio || '', fd.notas || 'Cargado desde movimiento');
      }
      if (kind === 'Gasto' && fd.categoria === 'Ahorro / Inversiones' && fd.metaAhorro) {
        await addAporteToMeta(Number(fd.metaAhorro), Number(fd.importe), fd.fecha);
      }
      // Crear o actualizar meta "Dolares ahorrados" para acumulacion USD sin meta especifica.
      if (extraRowsAhorro) {
        if (extraRowsAhorro.newMeta) {
          await addRow(TABLES.ahorro, [nextId(rows.ahorro), 'Dolares ahorrados', 'USD', 0, '', dateToExcelSerial(fd.fecha), extraRowsAhorro.usdCount, 'En curso', 'Auto-creada desde compra USD', extraRowsAhorro.usdCount, 'SI']);
        } else {
          await addAporteToMeta(extraRowsAhorro.rowIndex, extraRowsAhorro.usdCount, fd.fecha);
        }
      }
      closeModal(); await loadAll();
    } catch (err) { showError('No se pudo guardar: ' + err.message); setStatus('Error', 'err'); }
  });
}
window.toggleCotizacion = function(sel) { const g = document.getElementById('cotizGroup'); if (g) g.style.display = sel.value === 'USD' ? '' : 'none'; };

// ── MODAL: Compra con tarjeta ──
function openTcModal() {
  const cards = cardNames(true);
  // Inferir mes inicio de pago: si fecha < día 23 del mes → siguiente; si no → mes+1 igual
  // Regla: el resumen llega ~día 23 y se paga el primer día del mes siguiente. Compra del mes M → pago empieza M+1.
  $('#modalRoot').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <h2>Cargar compra con tarjeta</h2>
        <div class="modal-sub">Se imputa al mes en que la cuota efectivamente se paga.</div>
        <form id="tcFormNew">
          <div class="form-row">
            <div class="form-group">
              <label>Fecha de compra</label>
              <input type="date" name="fecha" value="${todayInputValue()}" required>
            </div>
            <div class="form-group">
              <label>Tarjeta</label>
              <select name="tarjeta" required>${cards.map(c => `<option>${c}</option>`).join('')}</select>
            </div>
          </div>
          <div class="form-group">
            <label>Descripción</label>
            <input type="text" name="descripcion" required placeholder="Ej: ML zapas hotsale">
          </div>
          <div class="form-group">
            <label>Categoría</label>
            <select name="categoria" onchange="updateSubcatSelect(this)">${CATEGORIAS_GASTO.map(c => `<option>${c}</option>`).join('')}</select>
          </div>
          <div class="form-group"><label>Subcategoría</label><select name="subcategoria">${subcatOptions(CATEGORIAS_GASTO[0])}</select></div>
          <div class="form-row-3">
            <div class="form-group">
              <label>Importe total</label>
              <input type="number" name="importe" step="0.01" required>
            </div>
            <div class="form-group">
              <label>Reintegro</label>
              <input type="number" name="reintegro" step="0.01" value="0">
            </div>
            <div class="form-group">
              <label>Cuotas</label>
              <input type="number" name="cuotas" min="1" value="1" required>
            </div>
          </div>
          <div class="form-group">
            <label>Mes en que empieza a pagarse</label>
            <input type="month" name="mesInicio" required>
            <div style="font-size:11px;color:var(--text-muted);margin-top:4px">Si comprás hoy (${new Date().toLocaleDateString('es-AR')}), el primer pago suele ser <strong>${labelMonthKey(nextMonthOf(thisMonthInputValue()))}</strong>.</div>
          </div>
          <div class="form-group">
            <label>Notas (opcional)</label>
            <input type="text" name="notas">
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-outline" onclick="closeModal()">Cancelar</button>
            <button type="submit" class="btn btn-success">Guardar compra y cuotas</button>
          </div>
        </form>
      </div>
    </div>`;
  $('#tcFormNew').querySelector('input[name="mesInicio"]').value = nextMonthOf(thisMonthInputValue());
  $('#tcFormNew').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target));
    const submitBtn = e.target.querySelector('button[type="submit"]');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Guardando…'; }
    const idCompra = nextCompraId(fd.tarjeta);
    const cuotasN = Number(fd.cuotas);
    const total = Number(fd.importe);
    const reintegro = Number(fd.reintegro || 0);
    const neto = total - reintegro;
    const valor = neto / cuotasN;
    const months = monthRange(fd.mesInicio, cuotasN);
    const mesFin = months[months.length - 1].serial;
    const cr = cuotasRestantes(mesFin);
    const compra = [
      nextId(rows.tarjetas), idCompra, dateToExcelSerial(fd.fecha), fd.tarjeta,
      fd.descripcion, fd.categoria || '', total, reintegro, neto, cuotasN, valor,
      months[0].serial, mesFin, cr, cr === 0 ? 'PAGADO' : 'PENDIENTE', 'ARS', fd.notas || '', fd.subcategoria || ''
    ];
    setStatus(`Guardando compra y ${cuotasN} cuotas...`, 'wait');
    try {
      // BATCH: una sola subida al final, no N. Antes podia tardar 30s+ con muchas
      // cuotas y el modal parecia colgado.
      const adds = [{ table: TABLES.tarjetas, values: compra }];
      let cuotaId = nextId(rows.cuotas);
      for (let i = 0; i < months.length; i++) {
        adds.push({ table: TABLES.cuotas, values: [cuotaId++, idCompra, fd.tarjeta, fd.descripcion, i + 1, cuotasN, valor, months[i].serial, 'ARS', months[i].mes, months[i].año] });
      }
      await addRowsBatch(adds);
      closeModal();
      setStatus(`OK Compra guardada con ${cuotasN} cuotas`, 'ok');
      await loadAll();
    } catch (err) {
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Guardar compra y cuotas'; }
      showError('No se pudo guardar la compra: ' + err.message);
      setStatus('Error', 'err');
    }
  });
}

window.savePagoFromView = async function(i, markPaid = false, forceEstado = null) {
  const p = (window._pagoView || [])[i];
  if (!p) return;
  const estEl = document.getElementById('est_' + i);
  const realEl = document.getElementById('real_' + i);
  const estimado = estEl ? Number(estEl.value || 0) : Number(p.MontoEstimado || 0);
  const real = realEl ? Number(realEl.value || 0) : Number(p.MontoReal || 0);
  const estado = forceEstado || (markPaid ? 'Pagado' : (p.Estado || 'Pendiente'));
  const fechaPago = estado === 'Pagado' ? dateToExcelSerial(todayInputValue()) : '';
  const medio = p.MedioPago || 'Transferencia';

  setStatus('Guardando pago…', 'wait');
  try {
    if (p.__tipoFijo === 'TarjetaResumen') {
      await upsertResumenReal(p.__tarjetaRef, Number(p.Año), Number(p.Mes), real, estado, fechaPago, medio, p.Notas || '');
      if (markPaid && real > 0) await addPagoTarjetaMovimiento(p.__tarjetaRef, todayInputValue(), real, medio, 'Pago desde gastos fijos');
      await loadAll();
      return;
    }

    if (p.__virtual) {
      const row = [
        nextId(rows.pagos), Number(p.Año), Number(p.Mes), p.Concepto, p.Categoría || '',
        estimado, real, p.Moneda || 'ARS', p.FechaVencimiento || '',
        estado, fechaPago, medio, p.Notas || ''
      ];
      await addRow(TABLES.pagos, row);
    } else {
      const excelRow = pagoRowIndexToExcelRow(p.__rowIndex);
      await patchCell(SHEETS.pagos, 'F' + excelRow, estimado);
      await patchCell(SHEETS.pagos, 'G' + excelRow, real);
      await patchCell(SHEETS.pagos, 'J' + excelRow, estado);
      await patchCell(SHEETS.pagos, 'K' + excelRow, fechaPago);
      await patchCell(SHEETS.pagos, 'L' + excelRow, medio);
    }

    if (markPaid && real > 0) {
      const txRow = [
        nextId(rows.transacciones), dateToExcelSerial(todayInputValue()), 'Gasto',
        p.Categoría || 'Otros', p.Concepto, real, 'ARS', medio, 'Auto-pago desde gastos fijos',
        new Date().getMonth() + 1, new Date().getFullYear(), p.Subcategoría || ''
      ];
      await addRow(TABLES.transacciones, txRow);
    }
    await loadAll();
  } catch (err) { showError('No se pudo guardar el pago: ' + err.message); setStatus('Error', 'err'); }
};

// ║ HELPERS — Tarjetas                                                     ║
// ╚════════════════════════════════════════════════════════════════════════╝
function nextId(arr) { return Math.max(0, ...arr.map(r => Number(r.ID || 0))) + 1; }
function cardPrefix(name) {
  if (name === 'Santa Fe PAPA') return 'SF';
  if (name === 'Macro PAPA') return 'MP';
  if (name === 'Macro FEDE') return 'MF';
  if (name === 'BBVA FEDE') return 'BF';
  return String(name || 'TC').split(/\s+/).map(x => x[0]).join('').slice(0, 3).toUpperCase();
}
function nextCompraId(tarjeta) {
  const p = cardPrefix(tarjeta);
  const nums = rows.tarjetas.map(r => String(r.IDCompra || '')).filter(x => x.startsWith(p + '-')).map(x => Number(x.split('-')[1] || 0));
  return p + '-' + String(Math.max(0, ...nums) + 1).padStart(3, '0');
}
function monthRange(startMonth, count) {
  const [y, m] = startMonth.split('-').map(Number);
  const out = [];
  for (let i = 0; i < count; i++) {
    const d = new Date(y, m - 1 + i, 1);
    out.push({ date: d, serial: Math.round(d.getTime() / 86400000 + 25569), mes: d.getMonth() + 1, año: d.getFullYear() });
  }
  return out;
}
function cuotasRestantes(mesFinSerial) {
  const fin = excelDateToDate(mesFinSerial);
  const now = new Date();
  if (!fin) return 0;
  return Math.max(0, (fin.getFullYear() - now.getFullYear()) * 12 + (fin.getMonth() - now.getMonth()) + 1);
}

// ╔════════════════════════════════════════════════════════════════════════╗
// ║ EVENTOS                                                                 ║
// ╚════════════════════════════════════════════════════════════════════════╝
$('#tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  currentTab = btn.dataset.tab;
  $$('#tabs .tab').forEach(b => b.classList.toggle('active', b === btn));
  renderTabContent();
});
$('#monthSelect').addEventListener('change', e => { selectedMonth = e.target.value; renderAll(); });
$('#btnRefresh').addEventListener('click', loadAll);
$('#btnLogout').addEventListener('click', logout);
$('#btnNuevoGasto').addEventListener('click', openTxModal);
$('#loginBtn').addEventListener('click', login);

// expose to window for inline handlers
window.openTxModal = openTxModal;
window.openTcModal = openTcModal;
window.openPagoModal = openPagoModal;
window.openFijoModal = openFijoModal;
window.openResumenRealModal = openResumenRealModal;
window.toggleTxCardSelector = function(value) { const el = document.getElementById('txCardSelector'); if (el) el.style.display = value === 'Tarjeta de crédito' ? 'block' : 'none'; };
window.openTarjetaModal = openTarjetaModal;
window.closeModal = closeModal;

// ╔════════════════════════════════════════════════════════════════════════╗
// ║ BOOT                                                                    ║
// ╚════════════════════════════════════════════════════════════════════════╝
window.MSAL_LOAD_PROMISE.then(() => initAuth()).catch(err => {
  console.error('Boot error:', err);
  $('#loadingScreen').style.display = 'none';
  $('#loginScreen').style.display = 'flex';
  showError('Error al cargar MSAL: ' + (err.message || err));
});

window.addEventListener('error', e => console.error('Error global:', e.message, e.error));
</script>
